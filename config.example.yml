# =============================================================================

runninghub:
  host: "https://www.runninghub.cn"
  api_key: "9549532f3c3d435eXXXX"
  max_concurrent_slots: 3  # RunningHub 最大并发槽位数量
# Server configuration
server:
  host: "http://localhost:9003"
  is_local: true  # 是否为本地环境，如果是本地环境，进行图片生成以及视频生成时，将参考图片上传到图床中。
  https_host: "https://localhost:12443"
  port: 9003                # 如需自定义端口可保留
  https_port: 5174
  https:
    enabled: false
    certfile: "secret/xxx.pem"
    keyfile: "secret/xxx.key"
# Default timeout settings
timeout:
