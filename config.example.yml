    access_key: "IAM-0fZBG5O0nEj9Xy-d_vjtowNp4viwWmjaDx8tNjCY"  # 七牛云 Access Key
    secret_key: "HD3mwsOHnr5uSjPRTyvIWDrmwCEfOUlwQiT5HhNft9TB"  # 七牛云 Secret Key
    bucket_name: "jeffstric"  # 存储空间名称
    cdn_domain: "cdn.perseids.cn"  # CDN 加速域名  绑定CDN加速域名图文教程文档，您可以参考：https://developer.qiniu.com/fusion/manual/4939/the-domain-name-to-access 需要注意您要绑定工信部备案的域名。

