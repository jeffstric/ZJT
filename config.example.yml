# JIEKOU API configuration
jiekou:
  api_key: "sk_xxxxxxxxxx"
  base_url: "https://api.jiekou.ai"

# Task queue management
task_queue:
  max_retry_count: 30  # 最大重试次数，超过后任务将被标记为失败
  task_expire_days: 7  # 任务过期天数，创建后超过此天数的任务将被自动失败
  enable_expire_check: true  # 是否启用任务过期检查

# Upload file size limits (in MB)
upload:
  max_image_size_mb: 10  # 角色、场景、道具的参考图片最大大小限制（MB）

# Frontend debug mode
frontend:
  debug_password: "123"  # 前端 Debug 模式密码

# Workflow configuration
workflow:
  poll_status_interval: 30  # 工作流节点状态轮询间隔（秒），默认60秒

# Alembic 数据库迁移配置
alembic:
  auto_migrate: true  # 应用启动时是否自动执行迁移
  script_location: "alembic"  # 迁移脚本目录

# Edition configuration
