# Alembic 配置文件
# 数据库连接信息从 config_{env}.yml 动态读取

[alembic]
# 迁移脚本目录
script_location = alembic

# 版本文件命名模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# 时区设置
timezone = Asia/Shanghai

# 截断版本 slug 的长度
truncate_slug_length = 40

# 是否在 revision 后自动检测升级
revision_environment = false

# 设置为 true 会使 env.py 使用 post_write_hooks
post_write_hooks.hooks = 

# sqlalchemy.url 将在 env.py 中动态设置，此处留空
# sqlalchemy.url = 

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
