# Alembic Configuration
# Database connection is dynamically loaded from config_{env}.yml in env.py
#
# WARNING: Do NOT add Chinese or other non-ASCII characters in this file.
# On Windows, Python's configparser reads .ini files using the system default
# encoding (GBK on Chinese Windows), which will fail to decode UTF-8 content.

[alembic]
# Migration script directory
script_location = alembic

# Version file naming template
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone
timezone = Asia/Shanghai

# Truncate slug length
truncate_slug_length = 40

# Whether to auto-detect upgrade after revision
revision_environment = false

# Set to true to enable post_write_hooks in env.py
post_write_hooks.hooks = 

# sqlalchemy.url is dynamically set in env.py, leave empty here
# sqlalchemy.url = 

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
