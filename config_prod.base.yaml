runninghub:
  host: "https://www.runninghub.cn"
  api_key: ""
  max_concurrent_slots: 3 # 该值根据runninghub账号的 并发数决定，可以查看 https://www.runninghub.cn/vip-rights/2 查看并发数，注意，必须支持api调用的套餐才能使用 26年3月 基础版为1 专业版为3 专业Plus版为5 Max 为20

server:
  host: "http://localhost:9003"
  is_local: true
  https_host: "https://localhost:12443"
  port: 9003
  https_port: 5174
  https:
    enabled: false
    certfile: "secret/xxx.pem"
    keyfile: "secret/xxx.key"
  auto_upload_to_cdn: false
