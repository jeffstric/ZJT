<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 工具列表</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #9ca3af;
      --text: #e5e7eb;
      --primary: #22c55e;
      --primary-700: #15803d;
      --border: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans,
        Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: linear-gradient(180deg, #0b1020, #0f172a);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .card {
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; margin-bottom: 16px;
    }
    .title { font-size: 18px; font-weight: 700; letter-spacing: .4px; }
    .muted { color: var(--muted); font-size: 13px; }
    .list { padding: 10px; }
    .list-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-top: 1px solid var(--border); }
    .list-item:first-child { border-top: 0; }
    .btn {
      background: var(--primary);
      color: #051b0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(34,197,94,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform .06s ease, filter .2s ease;
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:active { transform: translateY(1px); }
    .btn.secondary { background: #374151; color: #e5e7eb; box-shadow: inset 0 1px 0 rgba(255,255,255,0.12); }

    .form { padding: 18px; border-top: 1px solid var(--border); }
    .field { margin-bottom: 14px; }
    .label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .input, .textarea {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .input:focus, .textarea:focus { border-color: #334155; box-shadow: 0 0 0 3px rgba(51,65,85,0.35); }
    .textarea { min-height: 90px; resize: vertical; }

    .row { display: flex; gap: 10px; align-items: center; }
    .row .input { flex: 1; }

    .preview { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .imgbox { background: #0b1220; border: 1px solid #1f2937; border-radius: 12px; overflow: hidden; }
    .imgbox img { width: 100%; display: block; }

    .status { padding: 10px 16px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }
    .danger { color: #fca5a5; }

    /* Login Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-tab {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .modal-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .modal-tab:hover { color: var(--text); }
    .code-btn {
      background: var(--primary);
      color: #051b0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.2s;
    }
    .code-btn:hover { filter: brightness(1.05); }
    .code-btn:disabled {
      background: #374151;
      color: #9ca3af;
      cursor: not-allowed;
    }
    
    /* User Info Styles */
    .user-info-wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .user-phone {
      font-size: 14px;
      color: var(--muted);
    }
    .computing-power-display {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
    }
    .computing-power-value {
      color: var(--primary);
      font-weight: 600;
    }
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 2px 6px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: all 0.2s;
    }
    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-color: var(--primary);
    }
    .refresh-btn:active {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>
  <div id="app" class="container">
    <div class="card">
      <header>
        <div class="title">{{ pageTitle }}</div>
        <div class="muted" v-if="route.name==='list'">共 {{ tools.length }} 个工具</div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <button class="btn secondary" v-if="route.name!=='list'" @click="goHome">返回</button>
          <template v-if="isLoggedIn">
            <div class="user-info-wrapper">
              <span class="user-phone">{{ maskedPhone }}</span>
              <div class="computing-power-display">
                <span>
                  算力: <span class="computing-power-value">{{ computingPower !== null ? computingPower : '加载中...' }}</span>
                </span>
                <button class="refresh-btn" @click="fetchComputingPower" title="刷新算力">
                  ↻
                </button>
              </div>
            </div>
            <button class="btn secondary" @click="handleLogout">登出</button>
          </template>
          <button class="btn" v-else @click="showLoginModal = true">登录</button>
        </div>
      </header>

      <router-view />
    </div>

    <!-- Login/Register Modal -->
    <div class="modal-overlay" v-if="showLoginModal" @click.self="closeModal">
      <div class="modal" style="position: relative;">
        <button class="modal-close" @click="closeModal">×</button>
        <div class="modal-title">{{ authMode === 'login' ? '用户登录' : (authMode === 'register' ? '用户注册' : '重置密码') }}</div>
        
        <!-- Tab Switcher -->
        <div class="modal-tabs">
          <button class="modal-tab" :class="{active: authMode === 'login'}" @click="switchAuthMode('login')">
            登录
          </button>
          <button class="modal-tab" :class="{active: authMode === 'register'}" @click="switchAuthMode('register')">
            注册
          </button>
          <button class="modal-tab" :class="{active: authMode === 'reset'}" @click="switchAuthMode('reset')">
            重置密码
          </button>
        </div>

        <!-- Login Form -->
        <div v-if="authMode === 'login'">
          <div class="field">
            <label class="label">手机号</label>
            <input class="input" type="tel" v-model="loginForm.phone" placeholder="请输入手机号" maxlength="11" />
          </div>
          <div class="field">
            <label class="label">密码</label>
            <input class="input" type="password" v-model="loginForm.password" placeholder="请输入密码" @keyup.enter="handleLogin" />
          </div>
          <div class="field" style="margin-top: 20px;">
            <button class="btn" style="width: 100%;" @click="handleLogin" :disabled="loginLoading">
              {{ loginLoading ? '登录中...' : '登录' }}
            </button>
          </div>
          <div class="status danger" v-if="loginError" style="text-align: center; margin-top: 10px;">{{ loginError }}</div>
        </div>

        <!-- Register Form -->
        <div v-if="authMode === 'register'">
          <div class="field">
            <label class="label">手机号</label>
            <input class="input" type="tel" v-model="registerForm.phone" placeholder="请输入手机号" maxlength="11" />
          </div>
          <div class="field">
            <label class="label">验证码</label>
            <div class="row">
              <input class="input" type="text" v-model="registerForm.code" placeholder="请输入验证码" maxlength="6" />
              <button class="code-btn" @click="sendVerificationCode" :disabled="codeSending || codeCountdown > 0">
                {{ codeCountdown > 0 ? `${codeCountdown}秒后重试` : (codeSending ? '发送中...' : '发送验证码') }}
              </button>
            </div>
          </div>
          <div class="field">
            <label class="label">密码</label>
            <input class="input" type="password" v-model="registerForm.password" placeholder="请输入密码" />
          </div>
          <div class="field">
            <label class="label">确认密码</label>
            <input class="input" type="password" v-model="registerForm.confirmPassword" placeholder="请再次输入密码" @keyup.enter="handleRegister" />
          </div>
          <div class="field" style="margin-top: 20px;">
            <button class="btn" style="width: 100%;" @click="handleRegister" :disabled="registerLoading">
              {{ registerLoading ? '注册中...' : '注册' }}
            </button>
          </div>
          <div class="status danger" v-if="registerError" style="text-align: center; margin-top: 10px;">{{ registerError }}</div>
        </div>

        <!-- Reset Password Form -->
        <div v-if="authMode === 'reset'">
          <div class="field">
            <label class="label">手机号</label>
            <input class="input" type="tel" v-model="resetForm.phone" placeholder="请输入手机号" maxlength="11" />
          </div>
          <div class="field">
            <label class="label">验证码</label>
            <div class="row">
              <input class="input" type="text" v-model="resetForm.code" placeholder="请输入验证码" maxlength="6" />
              <button class="code-btn" @click="sendResetCode" :disabled="resetCodeSending || resetCodeCountdown > 0">
                {{ resetCodeCountdown > 0 ? `${resetCodeCountdown}秒后重试` : (resetCodeSending ? '发送中...' : '发送验证码') }}
              </button>
            </div>
          </div>
          <div class="field">
            <label class="label">新密码</label>
            <input class="input" type="password" v-model="resetForm.newPassword" placeholder="请输入新密码" />
          </div>
          <div class="field">
            <label class="label">确认新密码</label>
            <input class="input" type="password" v-model="resetForm.confirmPassword" placeholder="请再次输入新密码" @keyup.enter="handleResetPassword" />
          </div>
          <div class="field" style="margin-top: 20px;">
            <button class="btn" style="width: 100%;" @click="handleResetPassword" :disabled="resetLoading">
              {{ resetLoading ? '重置中...' : '重置密码' }}
            </button>
          </div>
          <div class="status danger" v-if="resetError" style="text-align: center; margin-top: 10px;">{{ resetError }}</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script>
  const ListPage = {
    name: 'ListPage',
    template: `
      <div class="list">
        <div class="list-item" v-if="false">
          <div>
            <div style="font-weight:700">qwen中文图片编辑</div>
            <div class="muted">上传图片 + 提示词（调用 ComfyUI 工作流）</div>
          </div>
          <button class="btn" @click="$router.push({name:'image-edit'})">打开</button>
        </div>
        <div class="list-item">
          <div>
            <div style="font-weight:700">nano banana图片编辑</div>
            <div class="muted">上传图片 + 提示词</div>
          </div>
          <button class="btn" @click="$router.push({name:'nanobanana-edit'})">打开</button>
        </div>
        <div class="list-item">
          <div>
            <div style="font-weight:700">AI视频生成</div>
            <div class="muted">输入文本提示词生成视频</div>
          </div>
          <button class="btn" @click="$router.push({name:'ai-video-gen'})">打开</button>
        </div>
        <div class="list-item">
          <div>
            <div style="font-weight:700">小红书笔记修改</div>
            <div class="muted">直接跳转到表单页面进行笔记修改</div>
          </div>
          <button class="btn" onclick="location.href='http://ssh.perseids.cn:15678/form/8cd1955c-5cf6-4111-a3a4-406001d7e3b2'">打开</button>
        </div>
      </div>
    `,
  };

  const ImageEdit = {
    name: 'ImageEdit',
    data() {
      return {
        server: localStorage.getItem('comfyui_server') || 'http://127.0.0.1:8188/',
        file: null,
        prompt: '请输入图片的编辑指令',
        loading: false,
        error: '',
        results: [],
        promptId: '',
        status: '',
        statusInterval: null,
      }
    },
    computed: {
      canSubmit() { return !!this.file && !!this.prompt && !this.loading },
      statusText() {
        switch(this.status) {
          case 'submitted': return '任务已提交，等待处理...';
          case 'pending': return '任务排队中...';
          case 'running': return '正在生成图片...';
          case 'completed': return '生成完成！';
          case 'error': return '任务出错';
          case 'not_found': return '任务未找到';
          default: return '';
        }
      }
    },
    methods: {
      onFile(e){ this.file = e.target.files[0] || null; },
      
      async submit(){
        if(!this.canSubmit) return;
        this.loading = true; this.error=''; this.results=[]; this.promptId=''; this.status='';
        this.clearStatusCheck();
        
        try {
          const form = new FormData();
          form.append('image', this.file);
          form.append('prompt', this.prompt);
          if(this.server) form.append('server', this.server);

          const res = await axios.post('/api/qwen-image-edit', form, {
            headers: { 'Content-Type': 'multipart/form-data' },
          });
          
          this.promptId = res.data.prompt_id || '';
          this.status = res.data.status || 'submitted';
          
          // Start polling for status
          this.startStatusCheck();
          
        } catch (err) {
          console.error(err);
          this.error = err?.response?.data?.detail || err?.message || '请求失败';
          this.loading = false;
        }
      },
      
      async checkStatus() {
        if (!this.promptId) return;
        
        try {
          const url = `/api/status/${this.promptId}${this.server ? '?server=' + encodeURIComponent(this.server) : ''}`;
          const res = await axios.get(url);
          
          this.status = res.data.status;
          
          if (res.data.status === 'completed') {
            this.results = res.data.image_urls || [];
            this.loading = false;
            this.clearStatusCheck();
          } else if (res.data.status === 'error' || res.data.status === 'not_found') {
            this.error = '任务处理失败或未找到';
            this.loading = false;
            this.clearStatusCheck();
          }
        } catch (err) {
          console.error('Status check error:', err);
          // Continue checking, don't stop on temporary errors
        }
      },
      
      startStatusCheck() {
        this.statusInterval = setInterval(() => {
          this.checkStatus();
        }, 2000); // Check every 2 seconds
      },
      
      clearStatusCheck() {
        if (this.statusInterval) {
          clearInterval(this.statusInterval);
          this.statusInterval = null;
        }
      },
      
      getProxyImageUrl(url) {
        // Use backend proxy for image display to avoid CORS issues in Electron
        return `/api/proxy-image?url=${encodeURIComponent(url)}`;
      },

      isWechatBrowser() {
        const ua = navigator.userAgent.toLowerCase();
        return /micromessenger/.test(ua);
      },
      
      downloadImage(url, index) {
        const now = new Date();
        const dateStr = now.getFullYear().toString() + 
                       (now.getMonth() + 1).toString().padStart(2, '0') + 
                       now.getDate().toString().padStart(2, '0');
        const timeStr = now.getHours().toString().padStart(2, '0') + 
                       now.getMinutes().toString().padStart(2, '0');
        const filename = `qwen_image_${dateStr}_${timeStr}_${index + 1}.png`;
        const downloadUrl = `/api/download?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename)}`;
        
        // 微信浏览器中直接打开图片，用户可以长按保存
        if (this.isWechatBrowser()) {
          window.open(downloadUrl, '_blank');
          // 提示用户如何保存
          setTimeout(() => {
            alert('请长按图片，然后选择“保存图片”');
          }, 500);
        } else {
          // 非微信浏览器使用标准下载方式
          const link = document.createElement('a');
          link.href = downloadUrl;
          link.download = filename;
          link.target = '_blank';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
      }
    },
    
    beforeUnmount() {
      this.clearStatusCheck();
    },
    template: `
      <div>
        <div class="form">
          <div class="field">
            <label class="label">ComfyUI 后端地址</label>
            <div class="input" style="background: #1a1f2e; color: #9ca3af; cursor: not-allowed;">{{ server || 'http://127.0.0.1:8188/' }}</div>
            <div class="muted" style="margin-top:6px">当前使用的 ComfyUI 服务地址</div>
          </div>

          <div class="field">
            <label class="label">上传图片</label>
            <input class="input" type="file" accept="image/*" @change="onFile" />
          </div>

          <div class="field">
            <label class="label">提示词</label>
            <textarea class="textarea" v-model.trim="prompt" placeholder="请输入对图片的编辑指令"></textarea>
          </div>

          <div class="field">
            <button class="btn" :disabled="!canSubmit" @click="submit">{{ loading ? '提交中…' : '提交任务' }}</button>
          </div>
        </div>

        <div class="status" v-if="promptId">任务 ID：{{ promptId }}</div>
        <div class="status" v-if="statusText">{{ statusText }}</div>
        <div class="status danger" v-if="error">{{ error }}</div>

        <div class="preview" v-if="results.length">
          <div class="imgbox" v-for="(url, i) in results" :key="i">
            <img :src="getProxyImageUrl(url)" :alt="'result-'+i" />
            <div style="padding: 8px; text-align: center;">
              <button class="btn secondary" @click="downloadImage(url, i)">下载图片</button>
            </div>
          </div>
        </div>
      </div>
    `
  };

  const NanobananaEdit = {
    name: 'NanobananaEdit',
    data() {
      return {
        file: null,
        prompt: '请输入图片的编辑指令',
        loading: false,
        error: '',
        results: [],
        taskId: '',
        status: '',
        statusInterval: null,
        authToken: '',
      }
    },
    mounted() {
      // Get auth_token from localStorage (set by App component)
      this.authToken = localStorage.getItem('auth_token') || '';
    },
    computed: {
      canSubmit() { return !!this.file && !!this.prompt && !this.loading },
      statusText() {
        switch(this.status) {
          case 'submitted': return '任务已提交，等待处理...';
          case 'QUEUED': return '任务排队中...';
          case 'RUNNING': return '正在生成图片...';
          case 'SUCCESS': return '生成完成！';
          case 'FAILED': return '任务失败';
          default: return '';
        }
      }
    },
    methods: {
      onFile(e){ this.file = e.target.files[0] || null; },
      
      async submit(){
        if(!this.canSubmit) return;
        this.loading = true; this.error=''; this.results=[]; this.taskId=''; this.status='';
        this.clearStatusCheck();
        
        try {
          const form = new FormData();
          form.append('image', this.file);
          form.append('prompt', this.prompt);
          
          // Add auth_token if available
          if (this.authToken) {
            form.append('auth_token', this.authToken);
          }

          const res = await axios.post('/api/nanobanana-edit', form, {
            headers: { 'Content-Type': 'multipart/form-data' },
          });
          
          this.taskId = res.data.task_id || '';
          this.status = res.data.status || 'submitted';
          
          // Start polling for status
          this.startStatusCheck();
          
        } catch (err) {
          console.error(err);
          this.error = err?.response?.data?.detail || err?.message || '请求失败';
          this.loading = false;
        }
      },
      
      async checkStatus() {
        if (!this.taskId) return;
        
        try {
          const res = await axios.get(`/api/nanobanana-status/${this.taskId}`);
          
          this.status = res.data.status;
          
          if (res.data.status === 'SUCCESS') {
            this.results = res.data.results || [];
            this.loading = false;
            this.clearStatusCheck();
          } else if (res.data.status === 'FAILED') {
            this.error = '任务处理失败';
            this.loading = false;
            this.clearStatusCheck();
          }
        } catch (err) {
          console.error('Status check error:', err);
          // Continue checking, don't stop on temporary errors
        }
      },
      
      startStatusCheck() {
        this.statusInterval = setInterval(() => {
          this.checkStatus();
        }, 3000); // Check every 3 seconds
      },
      
      clearStatusCheck() {
        if (this.statusInterval) {
          clearInterval(this.statusInterval);
          this.statusInterval = null;
        }
      },
      
      isWechatBrowser() {
        const ua = navigator.userAgent.toLowerCase();
        return /micromessenger/.test(ua);
      },
      
      downloadImage(url, index) {
        const now = new Date();
        const dateStr = now.getFullYear().toString() + 
                       (now.getMonth() + 1).toString().padStart(2, '0') + 
                       now.getDate().toString().padStart(2, '0');
        const timeStr = now.getHours().toString().padStart(2, '0') + 
                       now.getMinutes().toString().padStart(2, '0');
        const filename = `nanobanana_image_${dateStr}_${timeStr}_${index + 1}.png`;
        const downloadUrl = `/api/download?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename)}`;
        
        // 微信浏览器中直接打开图片，用户可以长按保存
        if (this.isWechatBrowser()) {
          window.open(downloadUrl, '_blank');
          // 提示用户如何保存
          setTimeout(() => {
            alert('请长按图片，然后选择“保存图片”');
          }, 500);
        } else {
          // 非微信浏览器使用标准下载方式
          const link = document.createElement('a');
          link.href = downloadUrl;
          link.download = filename;
          link.target = '_blank';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
      }
    },
    
    beforeUnmount() {
      this.clearStatusCheck();
    },
    template: `

  const AIVideoGen = {
    name: 'AIVideoGen',
    data() {
      return {
        prompt: '',
        model: 'portrait',
        loading: false,
        error: '',
        results: [],
        taskId: '',
        status: '',
        authToken: '',
      }
    },
    mounted() {
      // Get auth_token from localStorage (set by App component)
      this.authToken = localStorage.getItem('auth_token') || '';
    },
    computed: {
      canSubmit() { return !!this.prompt.trim() && !this.loading },
      statusText() {
        if (this.status === 'completed') return '生成完成！';
        if (this.loading) return '正在生成视频，请稍候...';
        return '';
      },
      modelOptions() {
        return [
          { value: 'portrait', label: '竖屏' },
          { value: 'landscape', label: '横屏' },

          { value: 'landscape-hd', label: '高清横屏' }
        ];
      }
    },
    methods: {
      async submit(){
        if(!this.canSubmit) return;
        this.loading = true; 
        this.error=''; 
        this.results=[]; 
        this.taskId=''; 
        this.status='';
        
        try {
          const form = new FormData();
          form.append('prompt', this.prompt);
          form.append('model', this.model);
          form.append('timeout', '900'); // 15 minutes timeout
          
          // Add auth_token if available
          if (this.authToken) {
            form.append('auth_token', this.authToken);
          }

          const res = await axios.post('/api/ai-app-run', form, {
            headers: { 'Content-Type': 'multipart/form-data' },
          });
          
          this.taskId = res.data.task_id || '';
          this.status = res.data.status || '';
          this.results = res.data.results || [];
          this.loading = false;
          
        } catch (err) {
          console.error(err);
          this.error = err?.response?.data?.detail || err?.message || '请求失败';
          this.loading = false;
        }
      },

                       (now.getMonth() + 1).toString().padStart(2, '0') +

                       now.getMinutes().toString().padStart(2, '0');

        const downloadUrl = `/api/download?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename)}`;

        link.target = '_blank';

  };

  const routes = [

  const App = {
    data(){ return { 
      tools: [
        {name:'qwen中文图片编辑', path:'/image-edit'},
        {name:'nano banana图片编辑', path:'/nanobanana-edit'},
        {name:'AI视频生成', path:'/ai-video-gen'},
        {name:'小红书笔记修改', path:'http://ssh.perseids.cn:15678/form/8cd1955c-5cf6-4111-a3a4-406001d7e3b2'}
      ],
      authToken: '',
      userPhone: '',
      computingPower: null,
      showLoginModal: false,
      authMode: 'login', // 'login' or 'register'
      loginForm: {
        phone: '',
        password: ''
      },
      loginLoading: false,
      loginError: '',
      registerForm: {
        phone: '',
        code: '',
        password: '',
        confirmPassword: ''
      },
      registerLoading: false,
      registerError: '',
      codeSending: false,
      codeCountdown: 0,
      countdownTimer: null,
      resetForm: {
        phone: '',
        code: '',
        newPassword: '',
        confirmPassword: ''
      },
      resetLoading: false,
      resetError: '',
      resetCodeSending: false,
      resetCodeCountdown: 0,
      resetCountdownTimer: null
    } },
    mounted() {
      // Extract auth_token from URL query parameters at app level
      const urlParams = new URLSearchParams(window.location.search);
      this.authToken = urlParams.get('auth_token') || '';
      this.userPhone = urlParams.get('phone') || '';
      if (this.authToken) {
        // Store in localStorage for persistence across sessions
        localStorage.setItem('auth_token', this.authToken);
        localStorage.setItem('phone', this.userPhone);
      } else {
        // Try to restore from localStorage
        this.authToken = localStorage.getItem('auth_token') || '';
        this.userPhone = localStorage.getItem('phone') || '';
      }
      
      // Fetch computing power if logged in
      if (this.authToken) {
        this.fetchComputingPower();
      }
    },
    computed: {
      route(){ return this.$route },
      pageTitle(){ 
        if (this.route.name === 'list') return 'AI 工具列表';
        if (this.route.name === 'image-edit') return 'qwen中文图片编辑';
        if (this.route.name === 'nanobanana-edit') return 'nano banano图片编辑';
        if (this.route.name === 'ai-video-gen') return 'AI 视频生成';
        return 'AI 工具';
      },
      isLoggedIn() {
        return !!(this.authToken && this.userPhone);
      },
      maskedPhone() {
        if (!this.userPhone || this.userPhone.length !== 11) {
          return this.userPhone;
        }
        // 隐藏中间4位：138****5678
        return this.userPhone.substring(0, 3) + '****' + this.userPhone.substring(7);
      }
    },
    methods: {
      goHome(){ this.$router.push({name:'list'}); },
      
      switchAuthMode(mode) {
        this.authMode = mode;
        this.loginError = '';
        this.registerError = '';
        this.resetError = '';
      },
      
      closeModal() {
        this.showLoginModal = false;
        this.authMode = 'login';
        this.loginError = '';
        this.registerError = '';
        this.resetError = '';
        this.loginForm.phone = '';
        this.loginForm.password = '';
        this.registerForm.phone = '';
        this.registerForm.code = '';
        this.registerForm.password = '';
        this.registerForm.confirmPassword = '';
        this.resetForm.phone = '';
        this.resetForm.code = '';
        this.resetForm.newPassword = '';
        this.resetForm.confirmPassword = '';
      },
      
      async handleLogin() {
        this.loginError = '';
        this.loginLoading = true;
        
        try {
          // 验证输入
          if (!this.loginForm.phone || !this.loginForm.password) {
            this.loginError = '请输入手机号和密码';
            this.loginLoading = false;
            return;
          }
          
          // 验证手机号格式
          if (!/^1[3-9]\d{9}$/.test(this.loginForm.phone)) {
            this.loginError = '请输入正确的手机号';
            this.loginLoading = false;
            return;
          }
          
          // 调用登录 API
          const response = await axios.post('/api/auth/login', {
            phone: this.loginForm.phone,
            password: this.loginForm.password,
            agent: 'default'
          });
          
          if (response.data.success) {
            // 登录成功，保存 token
            if (response.data.data && response.data.data.token) {
              this.authToken = response.data.data.token;
              this.userPhone = response.data.data.phone || this.loginForm.phone;
              localStorage.setItem('auth_token', this.authToken);
              localStorage.setItem('phone', this.userPhone);
              
              // 获取算力
              this.fetchComputingPower();
            }
            
            // 关闭模态框并清空表单
            this.closeModal();
            
          } else {
            this.loginError = response.data.message || '登录失败';
          }
          
        } catch (error) {
          console.error('Login error:', error);
          this.loginError = error?.response?.data?.message || '登录失败，请重试';
        } finally {
          this.loginLoading = false;
        }
      },
      
      async sendVerificationCode() {
        this.registerError = '';
        
        // 验证手机号
        if (!this.registerForm.phone) {
          this.registerError = '请输入手机号';
          return;
        }
        
        if (!/^1[3-9]\d{9}$/.test(this.registerForm.phone)) {
          this.registerError = '请输入正确的手机号';
          return;
        }
        
        this.codeSending = true;
        
        try {
          // 调用发送验证码 API
          const response = await axios.post('/api/auth/send_verify_code', {
            phone: this.registerForm.phone,
            type: 'register',
            agent: 'default'
          });
          
          if (response.data.success) {
            // 开始倒计时
            this.codeCountdown = 60;
            this.countdownTimer = setInterval(() => {
              this.codeCountdown--;
              if (this.codeCountdown <= 0) {
                clearInterval(this.countdownTimer);
                this.countdownTimer = null;
              }
            }, 1000);
          } else {
            this.registerError = response.data.message || '发送验证码失败';
          }
          
        } catch (error) {
          console.error('Send code error:', error);
          this.registerError = error?.response?.data?.message || '发送验证码失败，请重试';
        } finally {
          this.codeSending = false;
        }
      },
      
      async handleRegister() {
        this.registerError = '';
        this.registerLoading = true;
        
        try {
          // 验证输入
          if (!this.registerForm.phone || !this.registerForm.code || 
              !this.registerForm.password || !this.registerForm.confirmPassword) {
            this.registerError = '请填写完整信息';
            this.registerLoading = false;
            return;
          }
          
          // 验证手机号格式
          if (!/^1[3-9]\d{9}$/.test(this.registerForm.phone)) {
            this.registerError = '请输入正确的手机号';
            this.registerLoading = false;
            return;
          }
          
          // 验证密码长度
          if (this.registerForm.password.length < 6) {
            this.registerError = '密码长度不能少于6位';
            this.registerLoading = false;
            return;
          }
          
          // 验证两次密码是否一致
          if (this.registerForm.password !== this.registerForm.confirmPassword) {
            this.registerError = '两次输入的密码不一致';
            this.registerLoading = false;
            return;
          }
          
          // 调用注册 API
          const response = await axios.post('/api/auth/register', {
            phone: this.registerForm.phone,
            code: this.registerForm.code,
            password: this.registerForm.password,
            agent: 'default'
          });
          
          if (response.data.success) {
            // 注册成功，保存 token（如果有）
            if (response.data.data && response.data.data.token) {
              this.authToken = response.data.data.token;
              this.userPhone = response.data.data.phone || this.registerForm.phone;
              localStorage.setItem('auth_token', this.authToken);
              localStorage.setItem('phone', this.userPhone);
              
              // 获取算力
              this.fetchComputingPower();
            }
            
            // 关闭模态框并清空表单
            this.closeModal();
            
            // 提示用户注册成功
            alert('注册成功！');
          } else {
            this.registerError = response.data.message || '注册失败';
          }
          
        } catch (error) {
          console.error('Register error:', error);
          this.registerError = error?.response?.data?.message || '注册失败，请重试';
        } finally {
          this.registerLoading = false;
        }
      },
      
      async handleLogout() {
        try {
          // 调用后端登出API
          const response = await axios.post('/api/auth/logout', {
            auth_token: this.authToken
          });
          
          if (response.data.success) {
            // 登出成功，清除登录状态
            this.authToken = '';
            this.userPhone = '';
            this.computingPower = null;
            localStorage.removeItem('auth_token');
            localStorage.removeItem('phone');
          } else {
            // 即使后端登出失败，也清除本地状态
            console.error('Logout error:', response.data.message);
            this.authToken = '';
            this.userPhone = '';
            this.computingPower = null;
            localStorage.removeItem('auth_token');
            localStorage.removeItem('phone');
          }
        } catch (error) {
          console.error('Logout error:', error);
          // 发生错误时也清除本地状态
          this.authToken = '';
          this.userPhone = '';
          this.computingPower = null;
          localStorage.removeItem('auth_token');
          localStorage.removeItem('phone');
        }
      },
      
      async fetchComputingPower() {
        if (!this.authToken) {
          return;
        }
        
        try {
          const response = await axios.get('/api/user/computing_power', {
            headers: {
              'Authorization': `Bearer ${this.authToken}`
            }
          });
          
          if (response.data.success) {
            this.computingPower = response.data.data.computing_power;
          } else {
            this.computingPower = 0;
            console.error('Failed to fetch computing power:', response.data.message);
          }
        } catch (error) {
          console.error('Fetch computing power error:', error);
          this.computingPower = 0;
        }
      },
      
      async sendResetCode() {
        this.resetError = '';
        
        // 验证手机号
        if (!this.resetForm.phone) {
          this.resetError = '请输入手机号';
          return;
        }
        
        if (!/^1[3-9]\d{9}$/.test(this.resetForm.phone)) {
          this.resetError = '请输入正确的手机号';
          return;
        }
        
        this.resetCodeSending = true;
        
        try {
          // 调用发送验证码 API
          const response = await axios.post('/api/auth/send_verify_code', {
            phone: this.resetForm.phone,
            type: 'reset_password',
            agent: 'default'
          });
          
          if (response.data.success) {
            // 开始倒计时
            this.resetCodeCountdown = 60;
            this.resetCountdownTimer = setInterval(() => {
              this.resetCodeCountdown--;
              if (this.resetCodeCountdown <= 0) {
                clearInterval(this.resetCountdownTimer);
                this.resetCountdownTimer = null;
              }
            }, 1000);
          } else {
            this.resetError = response.data.message || '发送验证码失败';
          }
          
        } catch (error) {
          console.error('Send reset code error:', error);
          this.resetError = error?.response?.data?.message || '发送验证码失败，请重试';
        } finally {
          this.resetCodeSending = false;
        }
      },
      
      async handleResetPassword() {
        this.resetError = '';
        this.resetLoading = true;
        
        try {
          // 验证输入
          if (!this.resetForm.phone || !this.resetForm.code || 
              !this.resetForm.newPassword || !this.resetForm.confirmPassword) {
            this.resetError = '请填写完整信息';
            this.resetLoading = false;
            return;
          }
          
          // 验证手机号格式
          if (!/^1[3-9]\d{9}$/.test(this.resetForm.phone)) {
            this.resetError = '请输入正确的手机号';
            this.resetLoading = false;
            return;
          }
          
          // 验证密码长度

            this.resetError = '密码长度不能少于6位';
            this.resetLoading = false;
            return;

          // 验证两次密码是否一致

            this.resetError = '两次输入的密码不一致';
            this.resetLoading = false;
            return;
          }
          
          // 调用重置密码 API
          const response = await axios.post('/api/auth/reset_password', {
            phone: this.resetForm.phone,
            code: this.resetForm.code,
            new_password: this.resetForm.newPassword
          });
          
          if (response.data.success) {
            // 重置密码成功

            alert('密码重置成功，请使用新密码登录！');

        } catch (error) {
          console.error('Reset password error:', error);
          this.resetError = error?.response?.data?.message || '重置密码失败，请重试';
        } finally {
          this.resetLoading = false;
        }
      }
    },
    
    beforeUnmount() {
      // 清理倒计时定时器
      if (this.countdownTimer) {
        clearInterval(this.countdownTimer);
      }
      if (this.resetCountdownTimer) {
        clearInterval(this.resetCountdownTimer);
      }
    }
  };

  app.use(router);
  app.mount('#app');
  </script>
