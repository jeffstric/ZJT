<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 工具列表</title>
  <link rel="icon" href="/files/logo.ico" type="image/vnd.microsoft.icon"/>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #9ca3af;
      --text: #e5e7eb;
      --primary: #22c55e;
      --primary-700: #15803d;
      --border: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans,
        Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: linear-gradient(180deg, #0b1020, #0f172a);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .card {
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; margin-bottom: 16px;
    }
    .title { font-size: 18px; font-weight: 700; letter-spacing: .4px; }
    .muted { color: var(--muted); font-size: 13px; }
    .list { padding: 10px; }
    .list-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-top: 1px solid var(--border); }
    .list-item:first-child { border-top: 0; }
    .btn {
      background: var(--primary);
      color: #051b0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(34,197,94,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform .06s ease, filter .2s ease;
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:active { transform: translateY(1px); }
    .btn.secondary { background: #374151; color: #e5e7eb; box-shadow: inset 0 1px 0 rgba(255,255,255,0.12); }

    .form { padding: 18px; border-top: 1px solid var(--border); }
    .field { margin-bottom: 14px; }
    .label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .input, .textarea {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .input:focus, .textarea:focus { border-color: #334155; box-shadow: 0 0 0 3px rgba(51,65,85,0.35); }
    .textarea { min-height: 90px; resize: vertical; }

    .row { display: flex; gap: 10px; align-items: center; }
    .row .input { flex: 1; }
    .row .btn { flex: 1; }

    .preview { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .imgbox { background: #0b1220; border: 1px solid #1f2937; border-radius: 12px; overflow: hidden; }
    .imgbox img { width: 100%; display: block; }

    .status { padding: 10px 16px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }
    .danger { color: #fca5a5; }

    /* Login Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-tab {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .modal-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .modal-tab:hover { color: var(--text); }
    .code-btn {
      background: var(--primary);
      color: #051b0d;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.2s;
    }
    .code-btn:hover { filter: brightness(1.05); }
    .code-btn:disabled {
      background: #374151;
      color: #9ca3af;
      cursor: not-allowed;
    }
    
    /* User Info Styles */
    .user-info-wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .user-phone {
      font-size: 14px;
      color: var(--muted);
    }
    .computing-power-display {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
    }
    .computing-power-value {
      color: var(--primary);
      font-weight: 600;
    }
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 2px 6px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: all 0.2s;
    }
    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-color: var(--primary);
    }
    .refresh-btn:active {
      transform: rotate(180deg);
    }
    
    /* Prevent template flashing before Vue initializes */
    [v-cloak] {
      display: none !important;
    }
    
    /* Terms of Service Styles */
    .terms-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
      margin-bottom: 12px;
    }
    .terms-checkbox input[type="checkbox"] {
      margin-top: 2px;
      cursor: pointer;
    }
    .terms-link {
      color: var(--primary);
      text-decoration: underline;
      cursor: pointer;
    }
    .terms-link:hover {
      color: #16a34a;
    }
    .terms-modal {
      max-width: 700px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .terms-content {
      padding: 16px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
    }
    .terms-content h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--primary);
    }
    .terms-content h2 {
      font-size: 16px;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 12px;
      color: var(--text);
    }
    .terms-content strong {
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app" class="container" v-cloak>
    <div class="card">
      <header>
        <div class="title">{{ pageTitle }}</div>
        <div class="muted" v-if="route.name==='list'">共 {{ tools.length }} 个工具</div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <button class="btn secondary" v-if="route.name!=='list'" @click="goHome">返回</button>
          <template v-if="isLoggedIn">
            <div class="user-info-wrapper">
              <span class="user-phone">{{ maskedPhone }}</span>
              <div class="computing-power-display">
                <span>
                  算力: <span class="computing-power-value">{{ computingPower !== null ? computingPower : '加载中...' }}</span>
                </span>
                <button class="refresh-btn" @click="fetchComputingPower" title="刷新算力">
                  ↻
                </button>
              </div>
            </div>
            <button class="btn secondary" @click="handleLogout">登出</button>
          </template>
          <button class="btn" v-else @click="showLoginModal = true">登录</button>
        </div>
      </header>

      <router-view />
    </div>

    <!-- Login/Register Modal -->
    <div class="modal-overlay" v-if="showLoginModal" @click.self="closeModal">
      <div class="modal" style="position: relative;">
        <button class="modal-close" @click="closeModal">×</button>
        <div class="modal-title">{{ authMode === 'login' ? '用户登录' : (authMode === 'register' ? '用户注册' : '重置密码') }}</div>
        
        <!-- Tab Switcher -->
        <div class="modal-tabs">
          <button class="modal-tab" :class="{active: authMode === 'login'}" @click="switchAuthMode('login')">
            登录
          </button>
          <button class="modal-tab" :class="{active: authMode === 'register'}" @click="switchAuthMode('register')">
            注册
          </button>
          <button class="modal-tab" :class="{active: authMode === 'reset'}" @click="switchAuthMode('reset')">
            重置密码
          </button>
        </div>

        <!-- Login Form -->
        <div v-if="authMode === 'login'">
          <div class="field">
            <label class="label">手机号</label>
            <input class="input" type="tel" v-model="loginForm.phone" placeholder="请输入手机号" maxlength="11" />
          </div>
          <div class="field">
            <label class="label">密码</label>
            <input class="input" type="password" v-model="loginForm.password" placeholder="请输入密码" @keyup.enter="handleLogin" />
          </div>
          <div class="terms-checkbox">
            <input type="checkbox" id="login-terms" v-model="loginForm.termsAgreed" />
            <label for="login-terms" style="cursor: pointer;">
              我已阅读并同意 <span class="terms-link" @click.stop="showTermsModal = true">《AI工具服务使用条款》</span>
            </label>
          </div>
          <div class="field" style="margin-top: 20px;">
            <button class="btn" style="width: 100%;" @click="handleLogin" :disabled="loginLoading">
              {{ loginLoading ? '登录中...' : '登录' }}
            </button>
          </div>
          <div class="status danger" v-if="loginError" style="text-align: center; margin-top: 10px;">{{ loginError }}</div>
        </div>

        <!-- Register Form -->
        <div v-if="authMode === 'register'">
          <div class="field">
            <label class="label">手机号</label>
            <input class="input" type="tel" v-model="registerForm.phone" placeholder="请输入手机号" maxlength="11" />
          </div>
          <div class="field">
            <label class="label">验证码</label>
            <div class="row">
              <input class="input" type="text" v-model="registerForm.code" placeholder="请输入验证码" maxlength="6" />
              <button class="code-btn" @click="sendVerificationCode" :disabled="codeSending || codeCountdown > 0">
                {{ codeCountdown > 0 ? `${codeCountdown}秒后重试` : (codeSending ? '发送中...' : '发送验证码') }}
              </button>
            </div>
          </div>
          <div class="field">
            <label class="label">密码</label>
            <input class="input" type="password" v-model="registerForm.password" placeholder="请输入密码" />
          </div>
          <div class="field">
            <label class="label">确认密码</label>
            <input class="input" type="password" v-model="registerForm.confirmPassword" placeholder="请再次输入密码" @keyup.enter="handleRegister" />
          </div>
          <div class="field" style="margin-top: 20px;">
            <button class="btn" style="width: 100%;" @click="handleRegister" :disabled="registerLoading">
              {{ registerLoading ? '注册中...' : '注册' }}
            </button>
          </div>
          <div class="status danger" v-if="registerError" style="text-align: center; margin-top: 10px;">{{ registerError }}</div>
        </div>

        <!-- Reset Password Form -->
        <div v-if="authMode === 'reset'">
          <div class="field">
            <label class="label">手机号</label>
            <input class="input" type="tel" v-model="resetForm.phone" placeholder="请输入手机号" maxlength="11" />
          </div>
          <div class="field">
            <label class="label">验证码</label>
            <div class="row">
              <input class="input" type="text" v-model="resetForm.code" placeholder="请输入验证码" maxlength="6" />
              <button class="code-btn" @click="sendResetCode" :disabled="resetCodeSending || resetCodeCountdown > 0">
                {{ resetCodeCountdown > 0 ? `${resetCodeCountdown}秒后重试` : (resetCodeSending ? '发送中...' : '发送验证码') }}
              </button>
            </div>
          </div>
          <div class="field">
            <label class="label">新密码</label>
            <input class="input" type="password" v-model="resetForm.newPassword" placeholder="请输入新密码" />
          </div>
          <div class="field">
            <label class="label">确认新密码</label>
            <input class="input" type="password" v-model="resetForm.confirmPassword" placeholder="请再次输入新密码" @keyup.enter="handleResetPassword" />
          </div>
          <div class="field" style="margin-top: 20px;">
            <button class="btn" style="width: 100%;" @click="handleResetPassword" :disabled="resetLoading">
              {{ resetLoading ? '重置中...' : '重置密码' }}
            </button>
          </div>
          <div class="status danger" v-if="resetError" style="text-align: center; margin-top: 10px;">{{ resetError }}</div>
        </div>
      </div>
    </div>
    
    <!-- Terms of Service Modal -->
    <div class="modal-overlay" v-if="showTermsModal" @click.self="showTermsModal = false">
      <div class="modal terms-modal" style="position: relative;">
        <button class="modal-close" @click="showTermsModal = false">×</button>
        <div class="modal-title">AI工具服务使用条款</div>
        <div class="terms-content" v-html="termsContent"></div>
        <div style="padding: 16px; text-align: center;">
          <button class="btn" style="width: 100%;" @click="showTermsModal = false">我已阅读</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script>
  const ListPage = {
    name: 'ListPage',
    template: `
      <div class="list">
        <div class="list-item">
          <div>
            <div style="font-weight:700">图片编辑</div>
            <div class="muted">上传图片 + 提示词</div>
          </div>
          <button class="btn" @click="$router.push({name:'image-edit'})">打开</button>
        </div>
        <div class="list-item">
          <div>
            <div style="font-weight:700">AI视频生成</div>
            <div class="muted">输入文本提示词生成视频</div>
          </div>
          <button class="btn" @click="$router.push({name:'ai-video-gen'})">打开</button>
        </div>
        <div class="list-item">
          <div>
            <div style="font-weight:700">图片生成视频</div>
            <div class="muted">上传图片 + 提示词生成视频</div>
          </div>
          <button class="btn" @click="$router.push({name:'image-to-video'})">打开</button>
        </div>
        <div class="list-item">
          <div>
            <div style="font-weight:700">小红书笔记修改</div>
            <div class="muted">直接跳转到表单页面进行笔记修改</div>
          </div>
          <button class="btn" onclick="location.href='http://ssh.perseids.cn:15678/form/8cd1955c-5cf6-4111-a3a4-406001d7e3b2'">打开</button>
        </div>
      </div>
    `,
  };

  const ImageEdit = {
    name: 'ImageEdit',
    data() {
      return {
        file: null,
        prompt: '请输入图片的编辑指令',
        ratio: '9:16',
        loading: false,
        error: '',
        results: [],
        projectId: '',
        status: '',
        statusInterval: null,
        authToken: '',
        showHistory: false,
        historyList: [],
        historyLoading: false,
        historyPage: 1,
        historyTotal: 0,
        upscaling: false,
        upscaleProjectId: '',
        upscaleResults: [],
        upscaleStatusInterval: null,
      }
    },
    mounted() {
      // Get auth_token from localStorage (set by App component)
      this.authToken = localStorage.getItem('auth_token') || '';
    },
    computed: {
      canSubmit() { return !!this.file && !!this.prompt && !this.loading },
      ratioOptions() {
        return [
          { value: '9:16', label: '竖屏 (9:16)' },
          { value: '16:9', label: '横屏 (16:9)' },
          { value: '1:1', label: '正方形 (1:1)' },
          { value: '3:4', label: '竖屏 (3:4)' },
          { value: '4:3', label: '横屏 (4:3)' }
        ];
      },
      statusText() {
        switch(this.status) {
          case 'submitted': return '任务已提交，等待处理...';
          case 'QUEUED': return '任务排队中...';
          case 'RUNNING': return '正在生成图片...';
          case 'SUCCESS': return '生成完成！';
          case 'FAILED': return '任务失败';
          default: return '';
        }
      }
    },
    methods: {
      onFile(e){ this.file = e.target.files[0] || null; },
      
      async submit(){
        if(!this.canSubmit) return;
        this.loading = true; this.error=''; this.results=[]; this.projectId=''; this.status='';
        this.clearStatusCheck();
        
        try {
          const form = new FormData();
          form.append('image', this.file);
          form.append('prompt', this.prompt);
          form.append('ratio', this.ratio);
          
          // Add user_id from localStorage
          const userId = localStorage.getItem('user_id');
          if (userId) {
            form.append('user_id', userId);
          }
          
          // Add auth_token if available
          if (this.authToken) {
            form.append('auth_token', this.authToken);
          }

          const res = await axios.post('/api/image-edit', form, {
            headers: { 'Content-Type': 'multipart/form-data' },
          });
          
          this.projectId = res.data.project_id || '';
          this.status = res.data.status || 'submitted';
          
          // Start polling for status
          this.startStatusCheck();
          
        } catch (err) {
          console.error(err);
          this.error = err?.response?.data?.detail || err?.message || '请求失败';
          this.loading = false;
        }
      },
      
      async checkStatus() {
        if (!this.projectId) return;
        
        try {
          const authToken = localStorage.getItem('auth_token');
          const params = authToken ? { auth_token: authToken } : {};
          const res = await axios.get(`/api/get-status/${this.projectId}`, { params });
          
          this.status = res.data.status;
          
          if (res.data.status === 'SUCCESS') {
            this.results = res.data.results || [];
            this.loading = false;
            this.clearStatusCheck();
          } else if (res.data.status === 'FAILED') {
            this.error = res.data.reason || '任务处理失败';
            this.loading = false;
            this.clearStatusCheck();
          }
        } catch (err) {
          console.error('Status check error:', err);
          // Continue checking, don't stop on temporary errors
        }
      },
      
      startStatusCheck() {
        this.statusInterval = setInterval(() => {
          this.checkStatus();
        }, 3000); // Check every 3 seconds
      },
      
      clearStatusCheck() {
        if (this.statusInterval) {
          clearInterval(this.statusInterval);
          this.statusInterval = null;
        }
      },
      
      isWechatBrowser() {
        const ua = navigator.userAgent.toLowerCase();
        return /micromessenger/.test(ua);
      },
      
      downloadImage(url, index) {
        const now = new Date();
        const dateStr = now.getFullYear().toString() + 
                       (now.getMonth() + 1).toString().padStart(2, '0') + 
                       now.getDate().toString().padStart(2, '0');
        const timeStr = now.getHours().toString().padStart(2, '0') + 
                       now.getMinutes().toString().padStart(2, '0');
        const filename = `image_${dateStr}_${timeStr}_${index + 1}.png`;
        const downloadUrl = `/api/download?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename)}`;
        
        // 微信浏览器中直接打开图片，用户可以长按保存
        if (this.isWechatBrowser()) {
          window.open(downloadUrl, '_blank');
          // 提示用户如何保存
          setTimeout(() => {
            alert('请长按图片，然后选择“保存图片”');
          }, 500);
        } else {
          // 非微信浏览器使用标准下载方式
          const link = document.createElement('a');
          link.href = downloadUrl;
          link.download = filename;
          link.target = '_blank';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
      },
      
      async fetchHistory(append = false) {
        const userId = localStorage.getItem('user_id');
        if (!userId) {
          alert('请先登录');
          return;
        }
        
        if (!append) {
          this.historyPage = 1;
          this.historyList = [];
        }
        
        this.historyLoading = true;
        try {
          const authToken = localStorage.getItem('auth_token');
          const response = await axios.get('/api/ai-tools/history', {
            params: {
              user_id: parseInt(userId),
              page: this.historyPage,
              page_size: 20,
              type: 1,  // 1-图片编辑
              auth_token: authToken || undefined
            }
          });
          
          if (response.data.success) {
            const newData = response.data.data.data || [];
            if (append) {
              this.historyList = [...this.historyList, ...newData];
            } else {
              this.historyList = newData;
            }
            this.historyTotal = response.data.data.total || 0;
            this.showHistory = true;
          } else {
            alert(response.data.message || '获取历史记录失败');
          }
        } catch (err) {
          console.error(err);
          alert(err?.response?.data?.message || '获取历史记录失败');
        } finally {
          this.historyLoading = false;
        }
      },
      
      async loadMoreHistory() {
        if (this.historyLoading || this.historyList.length >= this.historyTotal) {
          return;
        }
        this.historyPage++;
        await this.fetchHistory(true);
      },
      
      handleHistoryScroll(event) {
        const element = event.target;
        const scrollBottom = element.scrollHeight - element.scrollTop - element.clientHeight;
        if (scrollBottom < 100) {
          this.loadMoreHistory();
        }
      },
      
      closeHistory() {
        this.showHistory = false;
        this.historyPage = 1;
        this.historyList = [];
      },
      
      getStatusText(status) {
        const statusMap = {
          0: '未处理',
          1: '处理中',
          2: '处理完成',
          '-1': '处理失败'
        };
        return statusMap[status] || '未知';
      },
      
      getStatusColor(status) {
        const colorMap = {
          0: '#888',
          1: '#3b82f6',
          2: '#10b981',
          '-1': '#ef4444'
        };
        return colorMap[status] || '#888';
      },
      
      getRatioLabel(value) {
        const ratioMap = {
          '9:16': '竖屏 (9:16)',
          '16:9': '横屏 (16:9)',
          '1:1': '正方形 (1:1)',
          '3:4': '竖屏 (3:4)',
          '4:3': '横屏 (4:3)'
        };
        return ratioMap[value] || value || '未知';
      },
      
      async upscaleImage() {
        if (!this.projectId) return;
        
        this.upscaling = true;
        this.error = '';
        
        try {
          const form = new FormData();
          form.append('project_id', this.projectId);
          form.append('user_id', localStorage.getItem('user_id') || '');
          form.append('auth_token', this.authToken);
          
          const res = await axios.post('/api/image-upscale', form);
          
          if (res.data.success) {
            this.upscaleProjectId = res.data.data.project_id;
            this.startUpscaleStatusCheck();
          } else {
            this.error = res.data.message || '高清放大失败';
            this.upscaling = false;
          }
        } catch (err) {
          console.error(err);
          this.error = err?.response?.data?.detail || err?.message || '高清放大请求失败';
          this.upscaling = false;
        }
      },
      
      startUpscaleStatusCheck() {
        this.checkUpscaleStatus();
      },
      
      async checkUpscaleStatus() {
        if (!this.upscaleProjectId) return;
        
        try {
          const authToken = localStorage.getItem('auth_token');
          const params = authToken ? { auth_token: authToken } : {};
          const res = await axios.get(`/api/runninghub-status/${this.upscaleProjectId}`, { params });
          
          if (res.data.status === 'SUCCESS') {
            this.upscaleResults = res.data.results || [];
            this.upscaling = false;
            this.clearUpscaleStatusCheck();
          } else if (res.data.status === 'FAILED') {
            this.error = '高清放大失败';
            this.upscaling = false;
            this.clearUpscaleStatusCheck();
          } else {
            // Still running, check again after 5 seconds
            this.upscaleStatusInterval = setTimeout(() => this.checkUpscaleStatus(), 5000);
          }
        } catch (err) {
          console.error('Upscale status check error:', err);
          // Continue checking, don't stop on temporary errors
          this.upscaleStatusInterval = setTimeout(() => this.checkUpscaleStatus(), 5000);
        }
      },
      
      clearUpscaleStatusCheck() {
        if (this.upscaleStatusInterval) {
          clearTimeout(this.upscaleStatusInterval);
          this.upscaleStatusInterval = null;
        }
      },
      
      async upscaleHistoryImage(item) {
        if (!item.project_id) return;
        
        try {
          const form = new FormData();
          form.append('project_id', item.project_id);
          form.append('user_id', localStorage.getItem('user_id') || '');
          form.append('auth_token', this.authToken);
          
          const res = await axios.post('/api/image-upscale', form);
          
          if (res.data.success) {
            alert('高清放大任务已创建，请稍后在历史记录中查看结果');
            // Refresh history to show the new upscale task
            await this.fetchHistory();
          } else {
            alert(res.data.message || '高清放大失败');
          }
        } catch (err) {
          console.error(err);
          alert(err?.response?.data?.detail || err?.message || '高清放大请求失败');
        }
      }
    },
    
    beforeUnmount() {
      this.clearStatusCheck();
      this.clearUpscaleStatusCheck();

  const ImageToVideo = {
    name: 'ImageToVideo',
    data() {
      return {
        files: [],
        prompt: '',
        model: '9:16',
        durationSeconds: 10,
        loading: false,
        error: '',
        results: [],
        projectId: '',
        status: '',
        authToken: '',
        showHistory: false,
        historyList: [],
        historyLoading: false,
        historyPage: 1,
        historyTotal: 0,
      }
    },
    mounted() {
      // Get auth_token from localStorage (set by App component)
      this.authToken = localStorage.getItem('auth_token') || '';
    },
    computed: {
      canSubmit() { return this.files.length > 0 && this.files.length <= 5 && !!this.prompt.trim() && !this.loading },
      statusText() {
        if (this.status === 'completed') return '生成完成！';
        if (this.loading) return '正在生成视频，请稍候...';
        return '';
      },
      modelOptions() {
        return [
          { value: '9:16', label: '竖屏' },
          { value: '16:9', label: '横屏' }
        ];
      },
      durationOptions() {
        return [
          { value: 10, label: '10秒' },
          { value: 15, label: '15秒' }
        ];
      }
    },
    methods: {
      onFile(e){ 
        const selectedFiles = Array.from(e.target.files || []);
        const remainingSlots = 5 - this.files.length;
        
        if (remainingSlots <= 0) {
          alert('已达到最大数量5张图片，请先删除一些图片');
          e.target.value = ''; // 清空input
          return;
        }
        
        if (selectedFiles.length > remainingSlots) {
          alert(`最多还能添加${remainingSlots}张图片，已自动截取前${remainingSlots}张`);
          this.files = [...this.files, ...selectedFiles.slice(0, remainingSlots)];
        } else {
          this.files = [...this.files, ...selectedFiles];
        }
        
        e.target.value = ''; // 清空input，允许重复选择同一文件
      },
      
      removeFile(index) {
        this.files.splice(index, 1);
      },
      
      clearAllFiles() {
        this.files = [];
      },
      
      async submit(){
        if(!this.canSubmit) return;
        this.loading = true; 
        this.error=''; 
        this.results=[]; 
        this.projectId=''; 
        this.status='';
        
        try {
          const form = new FormData();
          // Append all images
          this.files.forEach(file => {
            form.append('images', file);
          });
          form.append('prompt', this.prompt);
          form.append('model', this.model);
          form.append('duration_seconds', this.durationSeconds);
          
          // Add user_id from localStorage
          const userId = localStorage.getItem('user_id');
          if (userId) {
            form.append('user_id', userId);
          }
          
          // Add auth_token if available
          if (this.authToken) {
            form.append('auth_token', this.authToken);
          }

          const res = await axios.post('/api/ai-app-run-image', form, {
            headers: { 'Content-Type': 'multipart/form-data' },
          });
          
          this.projectId = res.data.project_id || '';
          this.status = res.data.status || '';
          
          // Start polling for status
          if (this.projectId) {
            this.checkStatus();
          }
          
        } catch (err) {
          console.error(err);
          this.error = err?.response?.data?.detail || err?.message || '请求失败';
          this.loading = false;
        }
      },
      
      async checkStatus() {
        if (!this.projectId) return;
        
        try {
          const authToken = localStorage.getItem('auth_token');
          const params = authToken ? { auth_token: authToken } : {};
          const res = await axios.get(`/api/get-status/${this.projectId}`, { params });
          this.status = res.data.status || '';
          
          if (this.status === 'SUCCESS') {
            this.results = res.data.results || [];
            this.loading = false;
            this.clearStatusCheck();
          } else if (this.status === 'FAILED') {
            this.error = res.data.reason || '任务失败';
            this.loading = false;
            this.clearStatusCheck();
          } else {
            // Still running, check again after 5 seconds
            this.statusInterval = setTimeout(() => this.checkStatus(), 5000);
          }
        } catch (err) {
          console.error(err);
          this.error = '查询状态失败';
          this.loading = false;
          this.clearStatusCheck();
        }
      },
      
      clearStatusCheck() {
        if (this.statusInterval) {
          clearTimeout(this.statusInterval);
          this.statusInterval = null;
        }
      },
      
      downloadVideo(url, index) {
        const now = new Date();
        const dateStr = now.getFullYear().toString() + 
                       (now.getMonth() + 1).toString().padStart(2, '0') + 
                       now.getDate().toString().padStart(2, '0');
        const timeStr = now.getHours().toString().padStart(2, '0') + 
                       now.getMinutes().toString().padStart(2, '0');
        const filename = `image_to_video_${dateStr}_${timeStr}_${index + 1}.mp4`;
        const downloadUrl = `/api/download?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename)}`;
        
        const link = document.createElement('a');
        link.href = downloadUrl;
        link.download = filename;
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      },
      
      async fetchHistory(append = false) {
        const userId = localStorage.getItem('user_id');
        if (!userId) {
          alert('请先登录');
          return;
        }
        
        if (!append) {
          this.historyPage = 1;
          this.historyList = [];
        }
        
        this.historyLoading = true;
        try {
          const authToken = localStorage.getItem('auth_token');
          const response = await axios.get('/api/ai-tools/history', {
            params: {
              user_id: parseInt(userId),
              page: this.historyPage,
              page_size: 20,
              type: 3,  // 3-图片生成视频
              auth_token: authToken || undefined
            }
          });
          
          if (response.data.success) {
            const newData = response.data.data.data || [];
            if (append) {
              this.historyList = [...this.historyList, ...newData];
            } else {
              this.historyList = newData;
            }
            this.historyTotal = response.data.data.total || 0;
            this.showHistory = true;
          } else {
            alert(response.data.message || '获取历史记录失败');
          }
        } catch (err) {
          console.error(err);
          alert(err?.response?.data?.message || '获取历史记录失败');
        } finally {
          this.historyLoading = false;
        }
      },
      
      async loadMoreHistory() {
        if (this.historyLoading || this.historyList.length >= this.historyTotal) {
          return;
        }
        this.historyPage++;
        await this.fetchHistory(true);
      },
      
      handleHistoryScroll(event) {
        const element = event.target;
        const scrollBottom = element.scrollHeight - element.scrollTop - element.clientHeight;
        if (scrollBottom < 100) {
          this.loadMoreHistory();
        }
      },
      
      closeHistory() {
        this.showHistory = false;
        this.historyPage = 1;
        this.historyList = [];
      },
      
      getStatusText(status) {
        const statusMap = {
          0: '未处理',
          1: '处理中',
          2: '处理完成',
          '-1': '处理失败'
        };
        return statusMap[status] || '未知';
      },
      
      getStatusColor(status) {
        const colorMap = {
          0: '#888',
          1: '#3b82f6',
          2: '#10b981',
          '-1': '#ef4444'
        };
        return colorMap[status] || '#888';
      },
      
      getModelLabel(value) {
        const modelMap = {
          '9:16': '竖屏',
          '16:9': '横屏'
        };
        return modelMap[value] || value || '未知';
      }
    },
    
    beforeUnmount() {
      this.clearStatusCheck();
    },

      async submit(){
        if(!this.canSubmit) return;
        this.loading = true; 
        this.error=''; 
        this.results=[]; 
        this.projectId=''; 
        this.status='';
        
        try {
          const form = new FormData();
          form.append('prompt', this.prompt);
          form.append('ratio', this.model);
          form.append('duration_seconds', this.durationSeconds);
          form.append('timeout', '900'); // 15 minutes timeout
          
          // Add user_id from localStorage
          const userId = localStorage.getItem('user_id');
          if (userId) {
            form.append('user_id', userId);
          }
          
          // Add auth_token if available
          if (this.authToken) {
            form.append('auth_token', this.authToken);
          }

          const res = await axios.post('/api/ai-app-run', form, {
            headers: { 'Content-Type': 'multipart/form-data' },
          });
          
          this.projectId = res.data.project_id || '';
          this.status = res.data.status || '';
          
          // Start polling for status
          if (this.projectId) {
            this.checkStatus();
          }
          
        } catch (err) {
          console.error(err);
          this.error = err?.response?.data?.detail || err?.message || '请求失败';
          this.loading = false;
        }
      },
      
      async checkStatus() {
        if (!this.projectId) return;
        
        try {
          const authToken = localStorage.getItem('auth_token');
          const params = authToken ? { auth_token: authToken } : {};
          const res = await axios.get(`/api/get-status/${this.projectId}`, { params });
          this.status = res.data.status || '';
          
          if (this.status === 'SUCCESS') {
            this.results = res.data.results || [];
            this.loading = false;
            this.clearStatusCheck();
            
            // Update database with result_url
            if (this.results.length > 0) {
              // Database is already updated by the status endpoint
            }
          } else if (this.status === 'FAILED') {
            this.error = res.data.reason || '任务失败';
            this.loading = false;
            this.clearStatusCheck();
          } else {
            // Still running, check again after 5 seconds
            this.statusInterval = setTimeout(() => this.checkStatus(), 5000);
          }
        } catch (err) {
          console.error(err);
          this.error = '查询状态失败';
          this.loading = false;
          this.clearStatusCheck();
        }
      },
      
      clearStatusCheck() {
        if (this.statusInterval) {
          clearTimeout(this.statusInterval);
          this.statusInterval = null;
        }
      },
      
      downloadVideo(url, index) {
        const now = new Date();
        const dateStr = now.getFullYear().toString() + 
                       (now.getMonth() + 1).toString().padStart(2, '0') + 
                       now.getDate().toString().padStart(2, '0');
        const timeStr = now.getHours().toString().padStart(2, '0') + 
                       now.getMinutes().toString().padStart(2, '0');
        const filename = `ai_video_${dateStr}_${timeStr}_${index + 1}.mp4`;
        const downloadUrl = `/api/download?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename)}`;
        
        const link = document.createElement('a');
        link.href = downloadUrl;
        link.download = filename;
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      },
      
      async fetchHistory(append = false) {
        const userId = localStorage.getItem('user_id');
        if (!userId) {
          alert('请先登录');
          return;
        }
        
        if (!append) {
          this.historyPage = 1;
          this.historyList = [];
        }
        
        this.historyLoading = true;
        try {
          const authToken = localStorage.getItem('auth_token');
          const response = await axios.get('/api/ai-tools/history', {
            params: {
              user_id: parseInt(userId),
              page: this.historyPage,
              page_size: 20,
              type: 2,  // 2-AI视频生成
              auth_token: authToken || undefined
            }
          });
          
          if (response.data.success) {
            const newData = response.data.data.data || [];
            if (append) {
              this.historyList = [...this.historyList, ...newData];
            } else {
              this.historyList = newData;
            }
            this.historyTotal = response.data.data.total || 0;
            this.showHistory = true;
          } else {
            alert(response.data.message || '获取历史记录失败');
          }
        } catch (err) {
          console.error(err);
          alert(err?.response?.data?.message || '获取历史记录失败');
        } finally {
          this.historyLoading = false;
        }
      },
      
      async loadMoreHistory() {
        if (this.historyLoading || this.historyList.length >= this.historyTotal) {
          return;
        }
        this.historyPage++;
        await this.fetchHistory(true);
      },
      
      handleHistoryScroll(event) {
        const element = event.target;
        const scrollBottom = element.scrollHeight - element.scrollTop - element.clientHeight;
        if (scrollBottom < 100) {
          this.loadMoreHistory();
        }
      },
      
      closeHistory() {
        this.showHistory = false;
        this.historyPage = 1;
        this.historyList = [];
      },
      
      getStatusText(status) {
        const statusMap = {
          0: '未处理',
          1: '处理中',
          2: '处理完成',
          '-1': '处理失败'
        };
        return statusMap[status] || '未知';
      },
      
      getStatusColor(status) {
        const colorMap = {
          0: '#888',
          1: '#3b82f6',
          2: '#10b981',
          '-1': '#ef4444'
        };
        return colorMap[status] || '#888';
      },
      
      getModelLabel(value) {
        const modelMap = {
          '9:16': '竖屏',
          '16:9': '横屏'
        };
        return modelMap[value] || value || '未知';
      }

          return;
        }
        
        if (!/^1[3-9]\d{9}$/.test(this.resetForm.phone)) {
          this.resetError = '请输入正确的手机号';
          return;
        }
        
        this.resetCodeSending = true;
        
        try {
          // 调用发送验证码 API
          const response = await axios.post('/api/auth/send_verify_code', {
            phone: this.resetForm.phone,
            type: 'reset_password',
            agent: 'default'
          });
          
          if (response.data.success) {
            // 开始倒计时
            this.resetCodeCountdown = 60;
            this.resetCountdownTimer = setInterval(() => {
              this.resetCodeCountdown--;
              if (this.resetCodeCountdown <= 0) {
                clearInterval(this.resetCountdownTimer);
                this.resetCountdownTimer = null;
              }
            }, 1000);
          } else {
            this.resetError = response.data.message || '发送验证码失败';
          }
          
        } catch (error) {
          console.error('Send reset code error:', error);
          this.resetError = error?.response?.data?.message || '发送验证码失败，请重试';
        } finally {
          this.resetCodeSending = false;
        }
      },
      
      async handleResetPassword() {
        this.resetError = '';
        this.resetLoading = true;
        
        try {
          // 验证输入
          if (!this.resetForm.phone || !this.resetForm.code || 
              !this.resetForm.newPassword || !this.resetForm.confirmPassword) {
            this.resetError = '请填写完整信息';
            this.resetLoading = false;
            return;
          }
          
          // 验证手机号格式
          if (!/^1[3-9]\d{9}$/.test(this.resetForm.phone)) {
            this.resetError = '请输入正确的手机号';
            this.resetLoading = false;
            return;
          }
          
          // 验证密码长度
          if (this.resetForm.newPassword.length < 6) {
            this.resetError = '密码长度不能少于6位';
            this.resetLoading = false;
            return;
          }
          
          // 验证两次密码是否一致
          if (this.resetForm.newPassword !== this.resetForm.confirmPassword) {
            this.resetError = '两次输入的密码不一致';
            this.resetLoading = false;
            return;
          }
          
          // 调用重置密码 API
          const response = await axios.post('/api/auth/reset_password', {
            phone: this.resetForm.phone,
            code: this.resetForm.code,
            new_password: this.resetForm.newPassword
          });
          
          if (response.data.success) {
            // 重置密码成功
            this.closeModal();
            alert('密码重置成功，请使用新密码登录！');
            // 切换到登录模式
            this.authMode = 'login';
          } else {
            this.resetError = response.data.message || '重置密码失败';
          }
          
        } catch (error) {
          console.error('Reset password error:', error);
          this.resetError = error?.response?.data?.message || '重置密码失败，请重试';
        } finally {
          this.resetLoading = false;
        }
      },
      
      async loadTermsContent() {
        try {
          const response = await axios.get('/files/AI工具服务使用条款.txt');
          // Convert markdown-like text to HTML
          let html = response.data
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')  // Bold text
            .replace(/^# (.*?)$/gm, '<h1>$1</h1>')  // H1 headers
            .replace(/^## (.*?)$/gm, '<h2>$1</h2>')  // H2 headers
            .replace(/\n\n/g, '</p><p>')  // Paragraphs
            .replace(/\n/g, '<br>');  // Line breaks
          
          this.termsContent = '<p>' + html + '</p>';
        } catch (error) {
          console.error('Failed to load terms:', error);
          this.termsContent = '<p>加载使用条款失败，请稍后重试。</p>';
        }
      }
    },
    
    beforeUnmount() {
      // 清理倒计时定时器
      if (this.countdownTimer) {
        clearInterval(this.countdownTimer);
      }
      if (this.resetCountdownTimer) {
        clearInterval(this.resetCountdownTimer);
      }
    }
  };

  const app = Vue.createApp(App);
  app.use(router);
  app.mount('#app');
  </script>
</body>
</html>
