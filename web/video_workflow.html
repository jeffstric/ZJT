<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>视频工作流</title>
  <link rel="icon" href="/files/logo.ico" type="image/vnd.microsoft.icon"/>
  <link rel="stylesheet" href="/css/video_workflow.css" />
</head>
<body>
  <div class="shell">
    <div class="canvas-container" id="canvasContainer">
      <div class="brand-floating">
        <a class="brand" href="/video-workflow-list" title="返回列表">
          <img src="/files/logo.svg" alt="logo" />
          <div class="brand-title">视频工作流</div>
        </a>
      </div>
      <div class="ratio-floating">
        <button class="btn save-btn" id="saveBtn" title="保存工作流">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          <span id="saveBtnText">保存</span>
        </button>
        <button class="btn secondary save-btn" id="styleBtn" title="画风设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <span>画风</span>
        </button>
        <div class="ratio-label">视频比例</div>
        <select id="ratioSelect">
          <option value="9:16">9:16</option>
          <option value="3:4">3:4</option>
          <option value="1:1">1:1</option>
          <option value="4:3">4:3</option>
          <option value="16:9" selected>16:9</option>
        </select>
      </div>
      <div class="add-btn-container" id="addBtnContainer">
        <button class="add-btn" id="addBtn" title="添加">+</button>
        <div class="add-menu" id="addMenu">
          <div class="add-menu-group">
            <div class="add-menu-label">添加节点</div>
            <div class="add-menu-item" id="menuAddVideo">
              <svg class="add-menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="3" y="6" width="14" height="12" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M17 10L21 8V16L17 14V10Z" fill="currentColor" />
              </svg>
              <span class="add-menu-text">图生视频</span>
            </div>
            <div class="add-menu-item" id="menuAddVideoNode">
              <svg class="add-menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="4" y="6" width="16" height="12" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M10 9.5V14.5L14.5 12L10 9.5Z" fill="currentColor" />
              </svg>
              <span class="add-menu-text">视频</span>
            </div>
            <div class="add-menu-item" id="menuAddImage">
              <svg class="add-menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="4" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M7 15L10 12L13 15L16 11L20 17H4L7 15Z" fill="currentColor" opacity="0.35" />
              </svg>
              <span class="add-menu-text">图片</span>
            </div>
            <div class="add-menu-item" id="menuAddScript">
              <svg class="add-menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M9 5H7C5.89543 5 5 5.89543 5 7V19C5 20.1046 5.89543 21 7 21H17C18.1046 21 19 20.1046 19 19V7C19 5.89543 18.1046 5 17 5H15" stroke="currentColor" stroke-width="2"/>
                <rect x="9" y="3" width="6" height="4" rx="1" stroke="currentColor" stroke-width="2"/>
              </svg>
              <span class="add-menu-text">剧本</span>
            </div>
            <div class="add-menu-item" id="menuAddShotGroup">
              <svg class="add-menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M6 9H18M6 12H14M6 15H12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span class="add-menu-text">分镜组</span>
            </div>
          </div>
          <div class="add-menu-group">
            <div class="add-menu-label">添加素材</div>
            <div class="add-menu-item" id="menuAddCharacter">
              <svg class="add-menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="12" cy="8" r="3" stroke="currentColor" stroke-width="2"/>
                <path d="M6 21C6 17.6863 8.68629 15 12 15C15.3137 15 18 17.6863 18 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span class="add-menu-text">角色</span>
            </div>
            <div class="add-menu-item" id="menuAddLocation">
              <svg class="add-menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2Z" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="2"/>
              </svg>
              <span class="add-menu-text">场景</span>
            </div>
            <div class="add-menu-item" id="menuAddAsset">
              <svg class="add-menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M6 8C6 6.89543 6.89543 6 8 6H20V18C20 19.1046 19.1046 20 18 20H8C6.89543 20 6 19.1046 6 18V8Z" stroke="currentColor" stroke-width="2" />
                <path d="M6 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M4 9C4 7.89543 4.89543 7 6 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M4 9V17C4 18.1046 4.89543 19 6 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <span class="add-menu-text">素材库</span>
            </div>
          </div>
        </div>
      </div>
      <div class="canvas-world" id="canvasWorld">
        <svg class="connections" id="connectionsSvg"></svg>
        <div class="canvas" id="canvas"></div>
      </div>
      <button class="conn-delete-btn" id="connDeleteBtn" title="删除连接线">×</button>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomInBtn" title="放大">+</button>
        <div class="zoom-level" id="zoomLevel">100%</div>
        <button class="zoom-btn" id="zoomOutBtn" title="缩小">−</button>
      </div>
      <div class="minimap" id="minimap">
        <div class="minimap-content" id="minimapContent"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="videoModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">视频预览</div>
        <button class="modal-close" id="videoModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <video id="videoModalPlayer" controls></video>
      </div>
    </div>
  </div>

  <div class="modal" id="imageModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title" id="imageModalTitle">图片预览</div>
        <button class="modal-close" id="imageModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <img id="imageModalImg" alt="" />
      </div>
    </div>
  </div>

  <div class="modal" id="shotGroupModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" style="max-width: 1200px; width: 90%;">
      <div class="modal-header">
        <div class="modal-title" id="shotGroupModalTitle">分镜组详情</div>
        <button class="modal-close" id="shotGroupModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <div id="shotGroupModalContent"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="shotDetailModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" style="max-width: 800px;">
      <div class="modal-header">
        <div class="modal-title" id="shotDetailModalTitle">分镜详情</div>
        <button class="modal-close" id="shotDetailModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <div id="shotDetailModalContent"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="shotGroupEditModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" style="max-width: 1200px; width: 90%;">
      <div class="modal-header">
        <div class="modal-title">编辑分镜组</div>
        <button class="modal-close" id="shotGroupEditModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <div id="shotGroupEditModalContent"></div>
      </div>
      <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 10px; padding: 12px 16px; border-top: 1px solid #e5e7eb;">
        <button class="mini-btn secondary" id="shotGroupEditCancelBtn" type="button">取消</button>
        <button class="mini-btn" id="shotGroupEditSaveBtn" type="button">保存</button>
      </div>
    </div>
  </div>

  <div class="modal" id="styleModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" style="max-width: 600px; background: #ffffff; color: #111827; border: 1px solid #e5e7eb;">
      <div class="modal-header" style="background: #f8fafc; border-bottom: 1px solid #e5e7eb;">
        <div class="modal-title" style="color: #0f172a;">画风设置</div>
        <button class="modal-close" id="styleModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" style="background: #ffffff; padding: 20px;">
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div class="field">
            <label class="label" style="color: #0f172a;">画风名称</label>
            <input type="text" id="styleNameInput" list="stylePresets" placeholder="选择或输入画风" style="width: 100%; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px;" />
            <datalist id="stylePresets">
              <option value="漫画风格">
              <option value="写实风格">
              <option value="日漫:新海诚风">
              <option value="美漫:漫威风">
              <option value="皮克斯风">
              <option value="日漫:宫崎骏风">
              <option value="迪士尼风格">
              <option value="国漫:3D动画风">
              <option value="日漫:今敏风">
              <option value="国漫:2D手绘风">
              <option value="日漫:细田守风">
              <option value="赛博朋克风">
              <option value="美漫:DC风">
            </datalist>
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">参考图</label>
            <input type="file" id="styleImageInput" accept="image/*" style="width: 100%; background: #f9fafb; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px; font-size: 13px;" />
            <div id="styleImagePreview" style="margin-top: 12px; display: none;">
              <img id="styleImagePreviewImg" style="max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid #e5e7eb; object-fit: contain;" />
              <button type="button" id="styleImageRemoveBtn" style="margin-top: 8px; padding: 6px 12px; background: #f3f4f6; color: #111827; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; cursor: pointer;">移除图片</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 10px; padding: 12px 16px; border-top: 1px solid #e5e7eb;">
        <button class="mini-btn secondary" id="styleCancelBtn" type="button">取消</button>
        <button class="mini-btn" id="styleSaveBtn" type="button">保存</button>
      </div>
    </div>
  </div>

  <!-- 角色选择模态框 -->
  <div class="modal" id="characterModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" style="max-width: 900px; background: #ffffff; color: #111827; border: 1px solid #e5e7eb;">
      <div class="modal-header" style="background: #f8fafc; border-bottom: 1px solid #e5e7eb;">
        <div class="modal-title" style="color: #0f172a;">选择角色</div>
        <button class="modal-close" id="characterModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" style="background: #ffffff; padding: 20px;">
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div class="field">
            <label class="label" style="color: #0f172a;">选择世界</label>
            <div style="display: flex; gap: 8px; align-items: center;">
              <select id="characterWorldSelect" style="flex: 1; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px;">
                <option value="">请先选择世界...</option>
              </select>
              <a id="characterCreateWorldBtn" href="javascript:void(0)" style="padding: 10px 16px; color: #22c55e; text-decoration: none; font-size: 14px; font-weight: 600; white-space: nowrap; border-bottom: 1px solid transparent; transition: border-color 0.2s;" onmouseover="this.style.borderColor='#22c55e'" onmouseout="this.style.borderColor='transparent'">创建世界</a>
            </div>
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">搜索角色</label>
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="text" id="characterSearchInput" placeholder="输入角色名称搜索..." style="flex: 1; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px;" />
              <a id="createCharacterBtn" href="javascript:void(0)" style="padding: 10px 16px; color: #3b82f6; text-decoration: none; font-size: 14px; font-weight: 600; white-space: nowrap; border-bottom: 1px solid transparent; transition: border-color 0.2s;" onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor='transparent'">创建角色</a>
            </div>
          </div>
          <div id="characterList" style="max-height: 400px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px;">
            <div style="text-align: center; color: #9ca3af; padding: 40px 20px;">
              请先选择世界
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 场景选择模态框 -->
  <div class="modal" id="locationModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" style="max-width: 900px; background: #ffffff; color: #111827; border: 1px solid #e5e7eb;">
      <div class="modal-header" style="background: #f8fafc; border-bottom: 1px solid #e5e7eb;">
        <div class="modal-title" style="color: #0f172a;">选择场景</div>
        <button class="modal-close" id="locationModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" style="background: #ffffff; padding: 20px;">
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div class="field">
            <label class="label" style="color: #0f172a;">选择世界</label>
            <div style="display: flex; gap: 8px; align-items: center;">
              <select id="locationWorldSelect" style="flex: 1; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px;">
                <option value="">请先选择世界...</option>
              </select>
              <a id="locationCreateWorldBtn" href="javascript:void(0)" style="padding: 10px 16px; color: #22c55e; text-decoration: none; font-size: 14px; font-weight: 600; white-space: nowrap; border-bottom: 1px solid transparent; transition: border-color 0.2s;" onmouseover="this.style.borderColor='#22c55e'" onmouseout="this.style.borderColor='transparent'">创建世界</a>
            </div>
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">搜索场景</label>
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="text" id="locationSearchInput" placeholder="输入场景名称搜索..." style="flex: 1; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px;" />
              <a id="createLocationBtn" href="javascript:void(0)" style="padding: 10px 16px; color: #3b82f6; text-decoration: none; font-size: 14px; font-weight: 600; white-space: nowrap; border-bottom: 1px solid transparent; transition: border-color 0.2s;" onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor='transparent'">创建场景</a>
            </div>
          </div>
          <div id="locationList" style="max-height: 400px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px;">
            <div style="text-align: center; color: #9ca3af; padding: 40px 20px;">
              请先选择世界
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 创建角色模态框 -->
  <div class="modal" id="createCharacterModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" style="max-width: 600px; background: #ffffff; color: #111827; border: 1px solid #e5e7eb;">
      <div class="modal-header" style="background: #f8fafc; border-bottom: 1px solid #e5e7eb;">
        <div class="modal-title" style="color: #0f172a;">创建角色</div>
        <button class="modal-close" id="createCharacterModalClose" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" style="background: #ffffff; padding: 20px;">
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div class="field">
            <label class="label" style="color: #0f172a;">角色名称 <span style="color: #ef4444;">*</span></label>
            <input type="text" id="createCharacterNameInput" placeholder="请输入角色名称..." style="width: 100%; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px;" />
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">年龄</label>
            <input type="text" id="createCharacterAgeInput" placeholder="请输入年龄..." style="width: 100%; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px;" />
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">身份/职业</label>
            <input type="text" id="createCharacterIdentityInput" placeholder="请输入身份或职业..." style="width: 100%; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px;" />
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">性格</label>
            <textarea id="createCharacterPersonalityInput" placeholder="请输入性格描述..." rows="3" style="width: 100%; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px; resize: vertical;"></textarea>
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">行为习惯</label>
            <textarea id="createCharacterBehaviorInput" placeholder="请输入行为习惯..." rows="3" style="width: 100%; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px; resize: vertical;"></textarea>
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">其他信息</label>
            <textarea id="createCharacterOtherInfoInput" placeholder="请输入其他信息..." rows="3" style="width: 100%; background: #ffffff; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; outline: none; font-size: 14px; resize: vertical;"></textarea>
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">参考图</label>
            <input type="file" id="createCharacterImageInput" accept="image/*" style="width: 100%; background: #f9fafb; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px; font-size: 13px;" />
          </div>
          <div class="field">
            <label class="label" style="color: #0f172a;">参考音频</label>
            <input type="file" id="createCharacterVoiceInput" accept="audio/*" style="width: 100%; background: #f9fafb; color: #0f172a; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px; font-size: 13px;" />
          </div>
        </div>
      </div>
      <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 10px; padding: 12px 16px; border-top: 1px solid #e5e7eb;">
        <button class="mini-btn secondary" id="createCharacterCancelBtn" type="button">取消</button>
        <button class="mini-btn" id="createCharacterSaveBtn" type="button">创建</button>
      </div>
    </div>
  </div>

  <!-- 创建场景模态框 -->
  <div class="modal" id="createLocationModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" style="max-width: 600px; background: #ffffff; color: #111827; border: 1px solid #e5e7eb;">
      <div class="modal-header" style="background: #f8fafc; border-bottom: 1px solid #e5e7eb;">
        <div class="modal-title" style="color: #0f172a;">创建场景</div>
        <button class="modal-close" id="createLocationModalClose" type="button" aria-label="关闭">×</button>

  <script>
    const state = {
      ratio: '16:9',
      nodes: [],
      connections: [],
      imageConnections: [],
      nextNodeId: 1,
      nextConnId: 1,
      nextImgConnId: 1,
      selectedNodeId: null,
      selectedConnId: null,
      selectedImgConnId: null,
      drag: null,
      connecting: null,
      panning: null,
      panX: 0,
      panY: 0,
      zoom: 1,
      timeline: {
        clips: [],
        nextClipId: 1,
        selectedClipId: null,
        visible: false,
      },
      style: {
        name: '',
        referenceImageUrl: ''
      }
    };

    function normalizeVideoUrl(item){
      if(!item) return '';
      if(typeof item === 'string') return item;
      if(typeof item === 'object'){
        return item.url || item.video_url || item.videoUrl || item.file_url || item.fileUrl || item.oss_url || item.ossUrl || item.path || '';
      }
      return '';
    }

    function extractResultsArray(payload){
      if(!payload) return [];
      if(Array.isArray(payload)) return payload;
      if(typeof payload !== 'object') return [];

      if(Array.isArray(payload.results)) return payload.results;
      if(Array.isArray(payload.result)) return payload.result;
      if(Array.isArray(payload.videos)) return payload.videos;
      if(Array.isArray(payload.video_urls)) return payload.video_urls;
      if(Array.isArray(payload.videoUrls)) return payload.videoUrls;

      if(payload.data){
        const nested = extractResultsArray(payload.data);
        if(nested.length) return nested;
      }

      if(payload.output){
        const nested = extractResultsArray(payload.output);
        if(nested.length) return nested;
      }

      // 兼容某些返回为 { results: { videos: [...] } } 或 { result: { url: ... } }
      if(payload.results && typeof payload.results === 'object'){
        const nested = extractResultsArray(payload.results);
        if(nested.length) return nested;
        return [payload.results];
      }
      if(payload.result && typeof payload.result === 'object'){
        const nested = extractResultsArray(payload.result);
        if(nested.length) return nested;
        return [payload.result];
      }

      return [];
    }

    function isSameOriginUrl(url){
      try{
        const u = new URL(url, window.location.href);
        return u.origin === window.location.origin;
      } catch(e){
        return true;
      }
    }

    function proxyImageUrl(url){
      if(!url) return '';
      if(typeof url !== 'string') return '';
      if(url.startsWith('data:') || url.startsWith('blob:')) return url;
      if(isSameOriginUrl(url)) return url;
      return `/api/proxy-image?url=${encodeURIComponent(url)}`;
    }

    function proxyDownloadUrl(url, filename){
      if(!url) return '';
      if(typeof url !== 'string') return '';
      if(url.startsWith('data:') || url.startsWith('blob:')) return url;
      if(isSameOriginUrl(url)) return url;
      const fn = filename ? `&filename=${encodeURIComponent(filename)}` : '';
      return `/api/download?url=${encodeURIComponent(url)}${fn}`;
    }

    const canvasEl = document.getElementById('canvas');
    const canvasContainer = document.getElementById('canvasContainer');
    const canvasWorld = document.getElementById('canvasWorld');
    const connectionsSvg = document.getElementById('connectionsSvg');
    const ratioSelectEl = document.getElementById('ratioSelect');
    const connDeleteBtn = document.getElementById('connDeleteBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomLevelEl = document.getElementById('zoomLevel');
    const minimap = document.getElementById('minimap');
    const minimapContent = document.getElementById('minimapContent');
    const videoModal = document.getElementById('videoModal');
    const videoModalClose = document.getElementById('videoModalClose');
    const videoModalPlayer = document.getElementById('videoModalPlayer');
    const imageModal = document.getElementById('imageModal');
    const imageModalClose = document.getElementById('imageModalClose');
    const imageModalImg = document.getElementById('imageModalImg');
    const imageModalTitle = document.getElementById('imageModalTitle');

    const MINIMAP_WIDTH = 180;
    const MINIMAP_HEIGHT = 120;
    const MINIMAP_PADDING = 10;

    // 测试模式：URL添加 ?test=1 即可启用，不会真正调用API
    const TEST_MODE = new URLSearchParams(window.location.search).get('test') === '1';
    if(TEST_MODE){
      console.log('%c[TEST MODE] 测试模式已启用，API调用将被模拟', 'color: orange; font-weight: bold;');
    }

    // 获取URL参数中的工作流ID
    function getWorkflowIdFromUrl(){
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // 获取auth token
    function getAuthToken(){
      return localStorage.getItem('auth_token') || '';
    }

    function getUserId(){
      return localStorage.getItem('user_id') || '';
    }

    // 显示Toast消息
    function showToast(message, type = ''){
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // 上传文件到服务器，返回永久URL
    async function uploadFile(file){
      const formData = new FormData();
      formData.append('file', file);
      
      try {
        const response = await fetch('/api/video-workflow/upload', {
          method: 'POST',
          headers: {
            'Authorization': getAuthToken(),
            'X-User-Id': getUserId()
          },
          body: formData
        });
        
        const result = await response.json();
        if(result.code === 0 && result.data && result.data.url){
          return result.data.url;
        } else {
          throw new Error(result.message || '上传失败');
        }
      } catch(error){
        console.error('Upload error:', error);
        showToast('文件上传失败: ' + error.message, 'error');
        return null;
      }
    }

    // 生成视频API调用
    async function generateVideoFromImage(imageUrl, prompt, duration, count, ratio){
      // 测试模式：模拟API响应
      if(TEST_MODE){
        console.log('[TEST MODE] 模拟生成视频API调用', { imageUrl, prompt, duration, count, ratio });
        await new Promise(r => setTimeout(r, 500)); // 模拟网络延迟
        const mockIds = [];
        for(let i = 0; i < (count || 1); i++){
          mockIds.push('mock_project_' + Date.now() + '_' + i);
        }
        return {
          projectIds: mockIds,
          status: 'submitted'
        };
      }

      const userId = localStorage.getItem('user_id');
      const authToken = getAuthToken();
      
      const form = new FormData();
      
      // 直接使用image_url，不需要重新上传
      form.append('image_url', imageUrl);
      form.append('prompt', prompt || '');
      form.append('ratio', ratio || '9:16');
      form.append('duration_seconds', duration || 10);
      form.append('count', count || 1);
      
      if(userId){
        form.append('user_id', userId);
      }
      if(authToken){
        form.append('auth_token', authToken);
      }

      const res = await fetch('/api/ai-app-run-image-url', {
        method: 'POST',
        body: form
      });
      
      const data = await res.json();
      if(data.project_ids && data.project_ids.length > 0){
        return {
          projectIds: data.project_ids,
          status: data.status
        };
      } else {
        throw new Error(data.detail || data.message || '提交任务失败');
      }
    }

    // 查询视频生成状态
    // 测试模式下的模拟状态计数器
    const mockStatusCounter = {};
    
    async function checkVideoStatus(projectIds){
      // 测试模式：模拟状态查询（第2次查询返回成功）
      if(TEST_MODE){
        const key = projectIds.join(',');
        mockStatusCounter[key] = (mockStatusCounter[key] || 0) + 1;
        console.log('[TEST MODE] 模拟查询状态，第', mockStatusCounter[key], '次');
        await new Promise(r => setTimeout(r, 300));
        
        if(mockStatusCounter[key] >= 2){
          // 第2次及以后返回成功，附带模拟视频URL
          const mockResults = projectIds.map((_, i) => 
            'http://ailive.perseids.cn/upload/test_video.mp4'
          );
          return { status: 'SUCCESS', results: mockResults };
        } else {
          return { status: 'RUNNING', results: [] };
        }
      }

      const authToken = getAuthToken();
      const projectIdsStr = projectIds.join(',');
      
      const url = `/api/get-status/${projectIdsStr}` + (authToken ? `?auth_token=${authToken}` : '');
      const res = await fetch(url);
      const data = await res.json();

      if(TEST_MODE){
        console.log('[TEST MODE] /api/get-status raw:', data);
      }
      
      if(data.tasks){
        // 多任务响应 - 返回每个任务的详细状态
        const tasks = data.tasks;
        const allSuccess = tasks.every(t => t.status === 'SUCCESS');
        const anyFailed = tasks.some(t => t.status === 'FAILED');
        const anyRunning = tasks.some(t => t.status === 'RUNNING');
        
        // 为每个任务提取结果和错误信息
        const taskDetails = tasks.map(task => {
          const results = extractResultsArray(task);
          return {
            status: task.status || 'RUNNING',
            result: results.length > 0 ? results[0] : null,
            error: task.reason || task.error || null
          };
        });
        
        // 全局状态判断
        let globalStatus = 'RUNNING';
        if(allSuccess){
          globalStatus = 'SUCCESS';
        } else if(anyFailed && !anyRunning){
          globalStatus = 'FAILED';
        }
        
        return { 
          status: globalStatus, 
          tasks: taskDetails,
          error: anyFailed ? '部分任务失败' : null
        };
      } else {
        // 单任务响应
        const results = extractResultsArray(data);
        return {
          status: data.status || 'RUNNING',
          tasks: [{
            status: data.status || 'RUNNING',
            result: results.length > 0 ? results[0] : null,
            error: data.reason || data.error || null
          }],
          error: data.reason || data.error
        };
      }
    }

    // ============ 时间轴功能 ============
    
    // 添加视频到时间轴
    function addToTimeline(nodeId) {
      const node = state.nodes.find(n => n.id === nodeId);
      if (!node || node.type !== 'video' || !node.data.url) {
        showToast('请先生成或上传视频', 'error');
        return;
      }
      
      // 如果没有时长，尝试获取
      if (!node.data.duration) {
        getVideoDuration(node.data.url).then(duration => {
          node.data.duration = duration;
          addClipToTimeline(nodeId, node, duration);
        }).catch(() => {
          addClipToTimeline(nodeId, node, 10);
        });
      } else {
        addClipToTimeline(nodeId, node, node.data.duration);
      }
    }
    
    // 添加片段到时间轴的辅助函数
    function addClipToTimeline(nodeId, node, duration) {
      const clip = {
        id: state.timeline.nextClipId++,
        nodeId: nodeId,
        url: node.data.url,
        name: node.data.name || '视频',
        duration: duration,
        startTime: 0,           // 剪切开始时间（秒）
        endTime: duration,      // 剪切结束时间（秒）
        order: state.timeline.clips.length,
      };
      
      state.timeline.clips.push(clip);
      state.timeline.visible = true;
      
      renderTimeline();
      showToast('已添加到时间轴', 'success');
      try{ autoSaveWorkflow(); } catch(e){}
    }
    
    // 获取视频时长
    function getVideoDuration(url) {
      return new Promise((resolve, reject) => {
        const video = document.createElement('video');
        video.preload = 'metadata';
        video.muted = true;
        
        video.addEventListener('loadedmetadata', () => {
          if (video.duration && isFinite(video.duration)) {
            resolve(Math.round(video.duration));
          } else {
            reject(new Error('Invalid duration'));
          }
          video.src = '';
        }, { once: true });
        
        video.addEventListener('error', () => {
          reject(new Error('Failed to load video'));
        }, { once: true });
        
        video.src = proxyDownloadUrl(url);
      });
    }
    
    // 从时间轴移除片段
    function removeFromTimeline(clipId) {
      state.timeline.clips = state.timeline.clips.filter(c => c.id !== clipId);
      state.timeline.clips.forEach((c, i) => c.order = i);
      renderTimeline();
      showToast('已从时间轴移除', 'success');
      try{ autoSaveWorkflow(); } catch(e){}
    }
    
    // 移动时间轴片段（拖拽排序）
    function moveTimelineClip(clipId, newOrder) {
      const clip = state.timeline.clips.find(c => c.id === clipId);
      if (!clip) return;
      
      const oldOrder = clip.order;
      if (oldOrder === newOrder) return;
      
      state.timeline.clips.forEach(c => {
        if (c.id === clipId) {
          c.order = newOrder;
        } else if (oldOrder < newOrder && c.order > oldOrder && c.order <= newOrder) {
          c.order--;
        } else if (oldOrder > newOrder && c.order >= newOrder && c.order < oldOrder) {
          c.order++;
        }
      });
      
      state.timeline.clips.sort((a, b) => a.order - b.order);
      renderTimeline();
      try{ autoSaveWorkflow(); } catch(e){}
    }
    
    // 渲染时间轴
    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      const track = document.getElementById('videoTrack');
      const ruler = document.getElementById('timelineRuler');
      const totalDurationEl = document.getElementById('timelineTotalDuration');
      const expandBtn = document.getElementById('timelineExpandBtn');
      
      if (!state.timeline.visible || state.timeline.clips.length === 0) {
        container.style.display = 'none';
        expandBtn.style.display = 'none';
        canvasContainer.classList.remove('timeline-visible');
        return;
      }
      
      container.style.display = 'flex';
      expandBtn.style.display = 'none';
      canvasContainer.classList.add('timeline-visible');
      
      // 计算总时长（考虑剪切后的实际播放时长）
      const totalDuration = state.timeline.clips.reduce((sum, c) => {
        const actualDuration = (c.endTime || c.duration) - (c.startTime || 0);
        return sum + actualDuration;
      }, 0);
      const minutes = Math.floor(totalDuration / 60);
      const seconds = (totalDuration % 60).toFixed(2);
      totalDurationEl.textContent = `总时长: ${minutes}:${seconds.padStart(5, '0')}`;
      
      renderTimelineRuler(ruler, totalDuration);
      
      const sortedClips = [...state.timeline.clips].sort((a, b) => a.order - b.order);
      
      // 计算每个片段的累计起始时间
      let accumulatedTime = 0;
      track.innerHTML = sortedClips.map(clip => {
        const startTime = accumulatedTime;
        // 计算剪切后的实际播放时长
        const clipStartTime = clip.startTime || 0;
        const clipEndTime = clip.endTime || clip.duration;
        const actualDuration = clipEndTime - clipStartTime;
        const width = actualDuration * 10;
        accumulatedTime += actualDuration;
        
        // 显示剪切信息
        const isTrimmed = clipStartTime > 0 || clipEndTime < clip.duration;
        const durationText = isTrimmed ? `${actualDuration.toFixed(1)}s (已剪切)` : `${actualDuration}s`;
        
        return `
          <div class="timeline-clip ${state.timeline.selectedClipId === clip.id ? 'selected' : ''}" 
               data-clip-id="${clip.id}" 
               draggable="true"
               style="position: absolute; left: ${startTime * 10}px; width: ${width}px;">
            <video class="timeline-clip-thumb" src="${proxyDownloadUrl(clip.url)}" muted preload="metadata"></video>
            <div class="timeline-clip-name" title="${clip.name}">${clip.name}</div>
            <div class="timeline-clip-duration">${durationText}</div>
            <div class="timeline-clip-actions">
              <button class="vp-btn clip-trim-btn" title="剪切">✂</button>
              <button class="vp-btn clip-remove-btn" title="移除">×</button>
            </div>
          </div>
        `;
      }).join('');
      
      // 设置轨道最小宽度以容纳所有片段
      track.style.minWidth = (totalDuration * 10 + 24) + 'px'; // 24px for padding
      
      bindTimelineClipEvents();
    }
    
    // 渲染时间刻度
    function renderTimelineRuler(ruler, totalDuration) {
      let html = '';
      const interval = totalDuration > 60 ? 10 : 5;
      for (let i = 0; i <= totalDuration; i += interval) {
        const minutes = Math.floor(i / 60);
        const seconds = i % 60;
        const label = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        html += `<div class="ruler-mark" style="left:${i * 10}px;">${label}</div>`;
      }
      ruler.innerHTML = html;
    }
    
    // 替换时间轴片段
    function replaceTimelineClip(targetClipId, draggedClipId) {
      const targetClip = state.timeline.clips.find(c => c.id === targetClipId);
      const draggedClip = state.timeline.clips.find(c => c.id === draggedClipId);
      
      if (!targetClip || !draggedClip) return;
      
      // 用拖拽的片段内容替换目标片段
      targetClip.url = draggedClip.url;
      targetClip.name = draggedClip.name;
      targetClip.duration = draggedClip.duration;
      targetClip.startTime = draggedClip.startTime || 0;
      targetClip.endTime = draggedClip.endTime || draggedClip.duration;
      targetClip.nodeId = draggedClip.nodeId;
      
      // 删除被拖拽的片段
      state.timeline.clips = state.timeline.clips.filter(c => c.id !== draggedClipId);
      
      // 重新规范化order
      state.timeline.clips.sort((a, b) => a.order - b.order);
      state.timeline.clips.forEach((c, index) => {
        c.order = index;
      });
      
      renderTimeline();
      showToast('已替换视频片段', 'success');
      try{ autoSaveWorkflow(); } catch(e){}
    }
    
    // 绑定时间轴片段事件
    function bindTimelineClipEvents() {
      const track = document.getElementById('videoTrack');
      
      // 创建插入位置指示器
      let dropIndicator = track.querySelector('.timeline-drop-indicator');
      if (!dropIndicator) {
        dropIndicator = document.createElement('div');
        dropIndicator.className = 'timeline-drop-indicator';
        track.appendChild(dropIndicator);
      }
      
      let draggedClipId = null;
      let dropPosition = null; // { clipId, insertBefore: true/false }
      
      track.querySelectorAll('.timeline-clip').forEach(clipEl => {
        const clipId = Number(clipEl.dataset.clipId);
        
        clipEl.addEventListener('click', (e) => {
          if(e.target.classList.contains('clip-remove-btn')) return;
          if(e.target.classList.contains('clip-trim-btn')) return;
          state.timeline.selectedClipId = clipId;
          renderTimeline();
        });
        
        clipEl.addEventListener('dragstart', (e) => {
          draggedClipId = clipId;
          e.dataTransfer.setData('text/plain', clipId);
          e.dataTransfer.effectAllowed = 'move';
          clipEl.classList.add('dragging');
        });
        
        clipEl.addEventListener('dragend', () => {
          clipEl.classList.remove('dragging');
          dropIndicator.classList.remove('show');
          track.querySelectorAll('.timeline-clip').forEach(el => {
            el.classList.remove('drop-target');
          });
          draggedClipId = null;
          dropPosition = null;
        });
        
        clipEl.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (!draggedClipId || draggedClipId === clipId) {
            dropIndicator.classList.remove('show');
            return;
          }
          
          e.dataTransfer.dropEffect = 'move';
          
          // 检测是否按住Shift键进行替换
          if (e.shiftKey) {
            // 替换模式：高亮整个片段
            clipEl.classList.add('drop-target');
            dropIndicator.classList.remove('show');
            dropPosition = { clipId, replace: true };
          } else {
            // 插入模式：显示插入位置指示器
            clipEl.classList.remove('drop-target');
            
            const rect = clipEl.getBoundingClientRect();
            const mouseX = e.clientX;
            const clipCenterX = rect.left + rect.width / 2;
            const insertBefore = mouseX < clipCenterX;
            
            // 计算指示器位置
            const trackRect = track.getBoundingClientRect();
            let indicatorLeft;
            if (insertBefore) {
              indicatorLeft = rect.left - trackRect.left - 2;
            } else {
              indicatorLeft = rect.right - trackRect.left - 2;
            }
            
            dropIndicator.style.left = indicatorLeft + 'px';
            dropIndicator.classList.add('show');
            dropPosition = { clipId, insertBefore };
          }
        });
        
        clipEl.addEventListener('dragleave', (e) => {
          if (!clipEl.contains(e.relatedTarget)) {
            clipEl.classList.remove('drop-target');
          }
        });
        
        clipEl.addEventListener('drop', (e) => {
          e.preventDefault();
          e.stopPropagation();
          clipEl.classList.remove('drop-target');
          dropIndicator.classList.remove('show');
          
          if (!draggedClipId || draggedClipId === clipId || !dropPosition) return;
          
          if (dropPosition.replace) {
            // 替换模式
            replaceTimelineClip(clipId, draggedClipId);
          } else {
            // 插入模式
            // 先排序获取当前实际顺序
            const sortedClips = [...state.timeline.clips].sort((a, b) => a.order - b.order);
            const targetIndex = sortedClips.findIndex(c => c.id === clipId);
            const draggedIndex = sortedClips.findIndex(c => c.id === draggedClipId);
            
            if (targetIndex !== -1 && draggedIndex !== -1) {
              // 计算光标位置对应的最终插入位置
              let finalPosition;
              if (dropPosition.insertBefore) {
                // 光标在目标元素前面
                finalPosition = targetIndex;
              } else {
                // 光标在目标元素后面
                finalPosition = targetIndex + 1;
              }
              
              // 如果被拖拽元素在光标位置之前，需要调整最终位置
              // 因为移除被拖拽元素后，后面的元素会前移
              if (draggedIndex < finalPosition) {
                finalPosition--;
              }
              
              moveTimelineClipToPosition(draggedClipId, finalPosition);
            }
          }
          
          dropPosition = null;
        });
        
        const removeBtn = clipEl.querySelector('.clip-remove-btn');
        if(removeBtn){
          removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            removeFromTimeline(clipId);
          });
        }
        
        const trimBtn = clipEl.querySelector('.clip-trim-btn');
        if(trimBtn){
          trimBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            console.log('Trim button clicked, clipId:', clipId);
            openTrimDialog(clipId);
          });
        } else {
          console.warn('Trim button not found for clip:', clipId);
        }
      });
    }
    
    // 打开剪切对话框（带预览功能）
    function openTrimDialog(clipId) {
      const clip = state.timeline.clips.find(c => c.id === clipId);
      if(!clip) return;
      
      const startTime = clip.startTime || 0;
      const endTime = clip.endTime || clip.duration;
      
      // 创建模态框
      const dialog = document.createElement('div');
      dialog.className = 'modal show';
      dialog.id = 'trimDialog';
      dialog.innerHTML = `
        <div class="modal-card" style="max-width: 900px;">

            <div class="modal-title">剪切视频片段 - ${clip.name}</div>
            <button class="modal-close" type="button" aria-label="关闭">×</button>
          </div>
          <div class="modal-body" style="padding: 20px;">

            <div style="margin-bottom: 20px; background: #000; border-radius: 8px; overflow: hidden; position: relative;">
              <video id="trimPreviewVideo"

                     preload="metadata"
                     muted></video>

              <div id="trimLoadingOverlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff;">
                <div style="font-size: 16px; margin-bottom: 12px;">正在加载视频...</div>
                <div style="width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden;">
                  <div id="trimLoadingProgress" style="width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s;"></div>
                </div>
                <div id="trimLoadingText" style="font-size: 12px; margin-top: 8px; color: var(--muted);">准备中...</div>
              </div>
            </div>
            
            <!-- 时间轴滑块区域 -->
            <div style="margin-bottom: 20px;">
              <div id="trimTrackContainer" style="position: relative; height: 100px; background: #1a1a1a; border-radius: 8px; overflow: hidden; cursor: pointer; opacity: 0.5; pointer-events: none;">
                <!-- 视频缩略图轨道 -->
                <canvas id="trimThumbnailTrack" 
                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></canvas>
                
                <!-- 左侧遮罩 -->
                <div id="trimLeftMask" 
                     style="position: absolute; top: 0; left: 0; height: 100%; background: rgba(0, 0, 0, 0.7); pointer-events: none;"></div>
                
                <!-- 右侧遮罩 -->
                <div id="trimRightMask" 
                     style="position: absolute; top: 0; right: 0; height: 100%; background: rgba(0, 0, 0, 0.7); pointer-events: none;"></div>
                
                <!-- 选中区域边框 -->
                <div id="trimSelectedRange" 
                     style="position: absolute; top: 0; height: 100%; border: 3px solid #3b82f6; pointer-events: none; box-sizing: border-box;"></div>
                
                <!-- 开始时间滑块 -->
                <div id="trimStartHandle" 
                     style="position: absolute; top: 0; width: 16px; height: 100%; background: #3b82f6; cursor: ew-resize; z-index: 10; box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);">
                  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 3px; height: 50px; background: #fff; border-radius: 2px;"></div>
                </div>
                
                <!-- 结束时间滑块 -->
                <div id="trimEndHandle" 
                     style="position: absolute; top: 0; width: 16px; height: 100%; background: #3b82f6; cursor: ew-resize; z-index: 10; box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);">
                  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 3px; height: 50px; background: #fff; border-radius: 2px;"></div>
                </div>
              </div>
              
              <!-- 时间显示 -->
              <div style="display: flex; justify-content: space-between; margin-top: 12px; font-size: 13px; color: var(--text);">
                <span>开始: <strong id="trimStartTimeDisplay">0.0</strong>s</span>
                <span>剪辑时长: <strong id="trimDurationDisplay" style="color: #3b82f6;">0.0</strong>s</span>
                <span>结束: <strong id="trimEndTimeDisplay">0.0</strong>s</span>
              </div>
            </div>
            
            <!-- 播放控制和操作按钮 -->
            <div style="display: flex; gap: 12px; justify-content: space-between; align-items: center;">
              <div style="display: flex; gap: 12px;">
                <button class="btn btn-secondary" id="trimPlayBtn" type="button">▶ 预览剪辑效果</button>
                <button class="btn btn-secondary" id="trimResetBtn" type="button">重置</button>
              </div>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" id="trimCancelBtn" type="button">取消</button>
                <button class="btn btn-primary" id="confirmTrim" type="button">确定剪切</button>
              </div>
            </div>
          </div>
        </div>
      `;
      
      document.body.appendChild(dialog);
      
      // 获取DOM元素
      const video = dialog.querySelector('#trimPreviewVideo');
      const canvas = dialog.querySelector('#trimThumbnailTrack');
      const ctx = canvas.getContext('2d');
      const startHandle = dialog.querySelector('#trimStartHandle');
      const endHandle = dialog.querySelector('#trimEndHandle');
      const selectedRange = dialog.querySelector('#trimSelectedRange');
      const leftMask = dialog.querySelector('#trimLeftMask');
      const rightMask = dialog.querySelector('#trimRightMask');
      const startTimeDisplay = dialog.querySelector('#trimStartTimeDisplay');
      const endTimeDisplay = dialog.querySelector('#trimEndTimeDisplay');
      const durationDisplay = dialog.querySelector('#trimDurationDisplay');
      const playBtn = dialog.querySelector('#trimPlayBtn');
      const resetBtn = dialog.querySelector('#trimResetBtn');
      const trackContainer = dialog.querySelector('#trimTrackContainer');
      const loadingOverlay = dialog.querySelector('#trimLoadingOverlay');
      const loadingProgress = dialog.querySelector('#trimLoadingProgress');
      const loadingText = dialog.querySelector('#trimLoadingText');
      
      // 状态变量
      let currentStart = startTime;
      let currentEnd = endTime;
      let isDraggingStart = false;
      let isDraggingEnd = false;
      let isPlaying = false;
      let thumbnailsGenerated = false;
      let videoReady = false;
      
      // Blob URL（用于清理）
      let blobUrl = null;
      
      // 预下载视频为Blob，这样seek就能正常工作
      const preloadVideoAsBlob = () => {
        return new Promise((resolve, reject) => {
          loadingText.textContent = '正在下载视频以支持精确剪辑...';
          loadingProgress.style.width = '5%';
          
          const xhr = new XMLHttpRequest();
          xhr.open('GET', proxyDownloadUrl(clip.url), true);
          xhr.responseType = 'blob';
          
          xhr.onprogress = (e) => {
            if(e.lengthComputable){
              const percent = Math.round((e.loaded / e.total) * 70);
              loadingProgress.style.width = `${5 + percent}%`;
              const mb = (e.loaded / 1024 / 1024).toFixed(1);
              const totalMb = (e.total / 1024 / 1024).toFixed(1);
              loadingText.textContent = `下载视频中... ${mb}MB / ${totalMb}MB`;
            }
          };
          
          xhr.onload = () => {
            if(xhr.status === 200){
              const blob = xhr.response;
              blobUrl = URL.createObjectURL(blob);
              video.src = blobUrl;
              console.log('视频已下载为Blob，seek功能已启用');
              resolve();
            } else {
              reject(new Error(`下载失败: ${xhr.status}`));
            }
          };
          
          xhr.onerror = () => reject(new Error('网络错误'));
          xhr.ontimeout = () => reject(new Error('下载超时'));
          xhr.timeout = 120000; // 2分钟超时
          
          xhr.send();
        });
      };
      
      // 等待视频加载完成
      const waitForVideoReady = () => {
        return new Promise((resolve, reject) => {
          if(video.readyState >= 2 && video.duration && isFinite(video.duration)){
            videoReady = true;
            resolve();
            return;
          }
          
          const timeout = setTimeout(() => {
            reject(new Error('视频加载超时'));
          }, 30000);
          
          const onCanPlay = () => {
            if(video.duration && isFinite(video.duration) && video.duration > 0){
              clearTimeout(timeout);
              video.removeEventListener('canplay', onCanPlay);
              loadingText.textContent = '视频已就绪，正在生成缩略图...';
              loadingProgress.style.width = '80%';
              videoReady = true;
              resolve();
            }
          };
          
          video.addEventListener('canplay', onCanPlay);
          video.addEventListener('error', () => {
            clearTimeout(timeout);
            reject(new Error('视频加载失败'));
          });
        });
      };
      
      // 生成视频缩略图（使用seek方式，Blob URL支持精确seek）
      const generateThumbnails = async () => {
        if(thumbnailsGenerated) return;
        if(!videoReady) return;
        
        const containerWidth = trackContainer.offsetWidth;
        const containerHeight = trackContainer.offsetHeight;
        canvas.width = containerWidth;
        canvas.height = containerHeight;
        
        const thumbnailCount = 10;
        const thumbnailWidth = containerWidth / thumbnailCount;
        const videoDuration = video.duration;
        
        console.log('=== 开始生成缩略图（Seek模式）===');
        console.log('Video duration:', videoDuration, 'seconds');
        
        // 绘制帧到canvas指定位置
        const drawFrameAt = (index) => {
          const aspectRatio = video.videoWidth / video.videoHeight || 16/9;
          const drawHeight = containerHeight;
          const drawWidth = drawHeight * aspectRatio;
          const offsetX = (thumbnailWidth - drawWidth) / 2;
          
          ctx.drawImage(video, 
            index * thumbnailWidth + Math.max(0, offsetX), 0, 
            drawWidth, drawHeight);
        };
        
        // 等待seek完成并绘制
        const seekAndDraw = (index, time) => {
          return new Promise((resolve) => {
            const onSeeked = () => {
              video.removeEventListener('seeked', onSeeked);
              drawFrameAt(index);
              console.log(`✓ 缩略图 ${index + 1}/${thumbnailCount}: seek到=${time.toFixed(2)}s, 实际=${video.currentTime.toFixed(2)}s`);
              resolve();
            };
            video.addEventListener('seeked', onSeeked);
            video.currentTime = time;
          });
        };
        
        video.pause();
        
        // 按顺序生成每一帧
        for(let i = 0; i < thumbnailCount; i++){
          const time = thumbnailCount > 1 ? (i / (thumbnailCount - 1)) * videoDuration : 0;
          
          const progress = 80 + (i / thumbnailCount) * 20;
          loadingProgress.style.width = `${progress}%`;
          loadingText.textContent = `生成缩略图 ${i + 1}/${thumbnailCount}...`;
          
          await seekAndDraw(i, time);
        }
        
        thumbnailsGenerated = true;
        video.currentTime = currentStart;
        
        // 隐藏加载提示，启用时间轴
        loadingOverlay.style.display = 'none';
        trackContainer.style.opacity = '1';
        trackContainer.style.pointerEvents = 'auto';
        
        console.log('=== 缩略图生成完成 ===');
      };
      
      // 更新UI显示
      const updateUI = (updateVideoTime = false) => {
        const trackWidth = trackContainer.offsetWidth;
        const startPercent = (currentStart / clip.duration) * 100;
        const endPercent = (currentEnd / clip.duration) * 100;
        
        startHandle.style.left = `calc(${startPercent}% - 8px)`;
        endHandle.style.left = `calc(${endPercent}% - 8px)`;
        selectedRange.style.left = `${startPercent}%`;
        selectedRange.style.width = `${endPercent - startPercent}%`;
        
        // 更新遮罩
        leftMask.style.width = `${startPercent}%`;
        rightMask.style.width = `${100 - endPercent}%`;
        
        startTimeDisplay.textContent = currentStart.toFixed(1);
        endTimeDisplay.textContent = currentEnd.toFixed(1);
        durationDisplay.textContent = (currentEnd - currentStart).toFixed(1);
        
        // 只在明确指定时才更新视频时间
        if(updateVideoTime && !isPlaying){
          video.currentTime = currentStart;
        }
      };
      
      // 初始化：预下载视频为Blob，然后生成缩略图
      (async () => {
        try {
          // 先下载视频为Blob，这样seek才能正常工作
          await preloadVideoAsBlob();
          await waitForVideoReady();
          updateUI();
          await generateThumbnails();
        } catch(error) {
          console.error('视频加载或缩略图生成失败:', error);
          loadingText.textContent = '加载失败: ' + error.message;
          loadingText.style.color = '#ef4444';
          showToast('视频加载失败，请重试', 'error');
        }
      })();
      
      // 拖动开始滑块
      startHandle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        isDraggingStart = true;
      });
      
      // 拖动结束滑块
      endHandle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        isDraggingEnd = true;
      });
      
      // 点击时间轴跳转并播放
      trackContainer.addEventListener('click', (e) => {
        if(isDraggingStart || isDraggingEnd) return;
        if(e.target === startHandle || e.target === endHandle) return;
        if(e.target.parentElement === startHandle || e.target.parentElement === endHandle) return;
        
        const rect = trackContainer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const percent = x / rect.width;
        const time = percent * clip.duration;
        
        // 限制在剪辑范围内
        const targetTime = Math.max(currentStart, Math.min(time, currentEnd));
        video.currentTime = targetTime;
        
        // 自动播放
        if(!isPlaying){
          video.play();
          isPlaying = true;
          playBtn.textContent = '⏸ 暂停';
        }
      });
      
      // 鼠标移动事件
      const handleMouseMove = (e) => {
        if(!isDraggingStart && !isDraggingEnd) return;
        
        const rect = trackContainer.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        const percent = x / rect.width;
        const time = percent * clip.duration;
        
        if(isDraggingStart){
          currentStart = Math.max(0, Math.min(time, currentEnd - 0.1));
          // 拖动起点时更新视频画面到起点
          if(!isPlaying){
            video.currentTime = currentStart;
          }
        } else if(isDraggingEnd){
          currentEnd = Math.max(currentStart + 0.1, Math.min(time, clip.duration));
          // 拖动终点时不更新视频画面
        }
        
        updateUI(false);
      };
      
      // 鼠标释放事件
      const handleMouseUp = () => {
        // 拖动结束，不自动播放，让用户手动点击播放按钮
        isDraggingStart = false;
        isDraggingEnd = false;
      };
      
      document.addEventListener('mousemove', handleMouseMove);
      document.addEventListener('mouseup', handleMouseUp);
      
      // 预览播放（Blob URL支持精确seek）
      playBtn.addEventListener('click', () => {
        if(isPlaying){
          video.pause();
          isPlaying = false;
          playBtn.textContent = '▶ 预览剪辑效果';
        } else {
          // 从起点开始播放
          video.currentTime = currentStart;
          video.play();
          isPlaying = true;
          playBtn.textContent = '⏸ 暂停';
          console.log(`开始播放: 起点=${currentStart.toFixed(2)}s, 终点=${currentEnd.toFixed(2)}s`);
        }
      });
      
      // 视频播放时检查是否到达终点
      video.addEventListener('timeupdate', () => {
        if(isPlaying && video.currentTime >= currentEnd){
          video.pause();
          // 保留在终点画面，不回到起点
          isPlaying = false;
          playBtn.textContent = '▶ 预览剪辑效果';
          console.log(`到达终点: ${video.currentTime.toFixed(2)}s >= ${currentEnd.toFixed(2)}s, 已暂停并保留在终点画面`);
        }
      });
      
      // 重置按钮
      resetBtn.addEventListener('click', () => {
        currentStart = 0;
        currentEnd = clip.duration;
        updateUI();
      });
      
      // 关闭对话框
      const closeDialog = () => {
        document.removeEventListener('mousemove', handleMouseMove);
        document.removeEventListener('mouseup', handleMouseUp);
        video.pause();
        // 清理Blob URL，释放内存
        if(blobUrl){
          URL.revokeObjectURL(blobUrl);
          blobUrl = null;
        }
        dialog.classList.remove('show');
        setTimeout(() => dialog.remove(), 300);
      };
      
      // 取消按钮
      const cancelBtn = dialog.querySelector('#trimCancelBtn');
      if(cancelBtn){
        cancelBtn.addEventListener('click', closeDialog);
      }
      
      // 关闭按钮（右上角的×）
      dialog.querySelectorAll('.modal-close').forEach(btn => {
        btn.addEventListener('click', closeDialog);
      });
      
      // 确认剪切
      dialog.querySelector('#confirmTrim').addEventListener('click', () => {
        // 验证输入
        if(currentStart < 0 || currentStart >= clip.duration){
          showToast('开始时间无效', 'error');
          return;
        }
        if(currentEnd <= currentStart || currentEnd > clip.duration){
          showToast('结束时间必须大于开始时间且不超过视频时长', 'error');
          return;
        }
        
        // 更新片段的剪切时间
        clip.startTime = currentStart;
        clip.endTime = currentEnd;
        
        renderTimeline();
        showToast('剪切成功', 'success');
        try{ autoSaveWorkflow(); } catch(e){}
        
        closeDialog();
      });
      
      // 点击背景关闭
      dialog.addEventListener('click', (e) => {
        if(e.target === dialog){
          closeDialog();
        }
      });
    }
    
    // 移动片段到指定位置（简化版本）
    function moveTimelineClipToPosition(clipId, targetOrder) {
      const clipIndex = state.timeline.clips.findIndex(c => c.id === clipId);
      if (clipIndex === -1) return;
      
      // 先按当前order排序
      state.timeline.clips.sort((a, b) => a.order - b.order);
      
      // 移除元素
      const [clip] = state.timeline.clips.splice(clipIndex, 1);
      
      // 确保targetOrder在有效范围内
      targetOrder = Math.max(0, Math.min(targetOrder, state.timeline.clips.length));
      
      // 插入到新位置
      state.timeline.clips.splice(targetOrder, 0, clip);
      
      // 重新分配order
      state.timeline.clips.forEach((c, index) => {
        c.order = index;
      });
      
      renderTimeline();
      try{ autoSaveWorkflow(); } catch(e){}
    }

    // 轮询视频状态
    function pollVideoStatus(projectIds, onProgress, onComplete, onError, onTaskUpdate){
      let pollCount = 0;
      const maxPolls = 60; // 最多轮询60次（10分钟）
      
      const poll = async () => {
        pollCount++;
        try {
          const result = await checkVideoStatus(projectIds);
          
          // 如果有任务更新回调，实时更新每个任务的状态
          if(onTaskUpdate && result.tasks){
            onTaskUpdate(result.tasks);
          }
          
          if(result.status === 'SUCCESS' || result.status === 'FAILED'){
            // SUCCESS或FAILED都表示所有任务已完成，调用onComplete处理
            // onComplete会根据每个任务的详细状态来更新视频节点
            onComplete(result);
          } else {
            onProgress(`生成中... (${pollCount * 10}秒)`);
            if(pollCount < maxPolls){
              setTimeout(poll, 10000);
            } else {
              onError('生成超时，请稍后查看结果');
            }
          }
        } catch(e){
          console.error('Poll error:', e);
          if(pollCount < maxPolls){
            setTimeout(poll, 10000);
          } else {
            onError('查询状态失败');
          }
        }
      };
      
      poll();
    }

    // 序列化工作流数据（用于保存）
    function serializeWorkflow(){
      // 只保存必要的数据，排除File对象和临时URL
      const serializableNodes = state.nodes.map(node => {
        const nodeData = { ...node.data };
        // 移除File对象
        if(nodeData.file) delete nodeData.file;
        if(nodeData.startFile) delete nodeData.startFile;
        if(nodeData.endFile) delete nodeData.endFile;
        // 对于本地blob URL，需要清除（这些是临时的）
        // 服务器URL（以http开头）保留
        if(nodeData.url && nodeData.url.startsWith('blob:')) nodeData.url = '';
        if(nodeData.startUrl && nodeData.startUrl.startsWith('blob:')) nodeData.startUrl = '';
        if(nodeData.endUrl && nodeData.endUrl.startsWith('blob:')) nodeData.endUrl = '';
        if(nodeData.preview && nodeData.preview.startsWith('data:') && nodeData.url) nodeData.preview = nodeData.url;
        if(nodeData.startPreview && nodeData.startPreview.startsWith('data:') && nodeData.startUrl) nodeData.startPreview = nodeData.startUrl;
        if(nodeData.endPreview && nodeData.endPreview.startsWith('data:') && nodeData.endUrl) nodeData.endPreview = nodeData.endUrl;
        
        return {
          id: node.id,
          type: node.type,
          title: node.title,
          x: node.x,
          y: node.y,
          data: nodeData
        };
      });

      return {
        version: '1.0',
        ratio: state.ratio,
        viewport: {
          panX: state.panX,
          panY: state.panY,
          zoom: state.zoom
        },
        nextNodeId: state.nextNodeId,
        nextConnId: state.nextConnId,
        nextImgConnId: state.nextImgConnId,
        nodes: serializableNodes,
        connections: state.connections.map(c => ({ id: c.id, from: c.from, to: c.to })),
        imageConnections: state.imageConnections.map(c => ({ id: c.id, from: c.from, to: c.to, portType: c.portType })),
        timeline: {
          clips: state.timeline.clips,
          nextClipId: state.timeline.nextClipId,
        }
      };
    }

    // 保存工作流

      const saveBtn = document.getElementById('saveBtn');
      const saveBtnText = document.getElementById('saveBtnText');
      const workflowId = getWorkflowIdFromUrl();

      if(!workflowId){
        showToast('请先从列表创建或选择工作流', 'error');
        return;
      }

      saveBtn.disabled = true;
      saveBtnText.textContent = '保存中...';

      try {

        const response = await fetch(`/api/video-workflow/${workflowId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': getAuthToken(),
            'X-User-Id': getUserId()
          },
          body: JSON.stringify({
            workflow_data: workflowData
          })
        });

        if(result.code === 0){
          showToast('保存成功', 'success');
        } else {

    // 恢复工作流状态
    function restoreWorkflow(data){
      // 清除现有节点
      for(const node of [...state.nodes]){
        const el = canvasEl.querySelector(`.node[data-node-id="${node.id}"]`);
        if(el) el.remove();
      }
      
      // 重置状态
      state.nodes = [];
      state.connections = [];
      state.imageConnections = [];
      state.selectedNodeId = null;
      state.selectedConnId = null;
      state.selectedImgConnId = null;
      
      // 恢复视口
      if(data.viewport){
        state.panX = data.viewport.panX || 0;
        state.panY = data.viewport.panY || 0;
        state.zoom = data.viewport.zoom || 1;
        applyTransform();
        updateZoomLevel();
      }
      
      // 恢复比例
      if(data.ratio){
        state.ratio = data.ratio;
        ratioSelectEl.value = data.ratio;
      }
      
      // 恢复ID计数器
      state.nextNodeId = data.nextNodeId || 1;
      state.nextConnId = data.nextConnId || 1;
      state.nextImgConnId = data.nextImgConnId || 1;
      
      // 恢复节点
      if(data.nodes && Array.isArray(data.nodes)){
        for(const nodeData of data.nodes){
          restoreNode(nodeData);
        }
      }
      
      // 恢复连接
      if(data.connections && Array.isArray(data.connections)){
        state.connections = data.connections;
      }
      
      if(data.imageConnections && Array.isArray(data.imageConnections)){
        state.imageConnections = data.imageConnections;
      }
      
      // 恢复时间轴
      if(data.timeline){
        state.timeline.clips = data.timeline.clips || [];
        state.timeline.nextClipId = data.timeline.nextClipId || 1;
        state.timeline.visible = state.timeline.clips.length > 0;
        renderTimeline();
      }
      
      // 重新渲染
      renderConnections();
      renderImageConnections();
      renderMinimap();
    }

    // 恢复单个节点
    function restoreNode(nodeData){
      if(nodeData.type === 'image_to_video'){
        createImageToVideoNodeWithData(nodeData);
      } else if(nodeData.type === 'video'){
        createVideoNodeWithData(nodeData);
      } else if(nodeData.type === 'image'){
        createImageNodeWithData(nodeData);
      } else if(nodeData.type === 'image_edit'){
        // 兼容旧的 image_edit 节点，转换为新的 image 节点
        nodeData.type = 'image';
        nodeData.data.url = nodeData.data.imageUrl || nodeData.data.url || '';
        createImageNodeWithData(nodeData);
      } else if(nodeData.type === 'script'){
        createScriptNodeWithData(nodeData);
      } else if(nodeData.type === 'shot_group'){
        createShotGroupNodeWithData(nodeData);
      } else if(nodeData.type === 'character'){
        createCharacterNodeWithData(nodeData);
      } else if(nodeData.type === 'location'){
        createLocationNodeWithData(nodeData);
      }
    }

    async function fetchFileFromUrl(url){
      const res = await fetch(proxyImageUrl(url));
      if(!res.ok) throw new Error('无法获取图片内容');
      const blob = await res.blob();
      const name = 'image.png';
      try{
        return new File([blob], name, { type: blob.type || 'image/png' });
      } catch(e){
        // Fallback for older browsers
        blob.name = name;
        return blob;
      }
    }


    // 带数据创建图生视频节点（复用createImageToVideoNode的逻辑）
    function createImageToVideoNodeWithData(nodeData){
      // 临时保存nextNodeId
      const savedNextNodeId = state.nextNodeId;
      state.nextNodeId = nodeData.id;
      
      // 调用原有的创建函数
      createImageToVideoNode({ x: nodeData.x, y: nodeData.y });
      
      // 恢复nextNodeId为最大值
      state.nextNodeId = Math.max(savedNextNodeId, nodeData.id + 1);
      
      // 更新节点数据
      const node = state.nodes.find(n => n.id === nodeData.id);
      if(node && nodeData.data){
        node.data.prompt = nodeData.data.prompt || '';
        node.data.startUrl = nodeData.data.startUrl || '';
        node.data.endUrl = nodeData.data.endUrl || '';
        node.data.duration = nodeData.data.duration || 15;
        node.data.ratio = nodeData.data.ratio || state.ratio || '16:9';
        node.data.model = nodeData.data.model || 'sora';
        node.data.drawCount = nodeData.data.drawCount || 1;
        node.data.motionLevel = nodeData.data.motionLevel || 5;
        node.data.useMotion = nodeData.data.useMotion || false;
        
        // 更新DOM显示
        const el = canvasEl.querySelector(`.node[data-node-id="${node.id}"]`);
        if(el){
          // 更新提示词
          const promptEl = el.querySelector('.prompt');
          if(promptEl) promptEl.value = node.data.prompt;
          
          // 更新时长选择
          const durationSelect = el.querySelector('.duration-select');
          if(durationSelect) durationSelect.value = node.data.duration;
          
          // 先更新模型选择
          const modelSelect = el.querySelector('.model-select');
          if(modelSelect) modelSelect.value = node.data.model;
          
          // 根据模型更新比例选项，然后设置比例值
          const ratioSelect = el.querySelector('.ratio-select');
          if(ratioSelect && modelSelect) {
            const model = node.data.model;
            if(model === 'sora') {
              // sora只支持16:9和9:16
              ratioSelect.innerHTML = `
                <option value="9:16">9:16</option>
                <option value="16:9">16:9</option>
              `;
              // 如果保存的比例不在支持列表中，使用16:9
              if(node.data.ratio !== '9:16' && node.data.ratio !== '16:9') {
                node.data.ratio = '16:9';
              }
            } else {
              // 其他模型支持所有比例
              ratioSelect.innerHTML = `
                <option value="9:16">9:16</option>
                <option value="3:4">3:4</option>
                <option value="1:1">1:1</option>
                <option value="4:3">4:3</option>
                <option value="16:9">16:9</option>
              `;
            }
            ratioSelect.value = node.data.ratio;
          }
          
          // 更新抽卡次数标签
          const genCountLabel = el.querySelector('.gen-count-label');
          if(genCountLabel) genCountLabel.textContent = `抽卡次数：X${node.data.drawCount}`;
          
          // 更新首帧图片
          if(node.data.startUrl){
            const startPreviewRow = el.querySelector('.start-preview-row');
            const startPreview = el.querySelector('.start-preview');
            const startImagePort = el.querySelector('.start-image-port');
            if(startPreview){
              startPreview.src = proxyImageUrl(node.data.startUrl);
              node.data.startPreview = node.data.startUrl;
            }
            if(startPreviewRow) startPreviewRow.style.display = 'flex';
            if(startImagePort) startImagePort.classList.add('disabled');
          }
          
          // 更新尾帧图片
          if(node.data.endUrl){
            const endPreviewRow = el.querySelector('.end-preview-row');
            const endPreview = el.querySelector('.end-preview');
            const endImagePort = el.querySelector('.end-image-port');
            if(endPreview){
              endPreview.src = proxyImageUrl(node.data.endUrl);
              node.data.endPreview = node.data.endUrl;
            }
            if(endPreviewRow) endPreviewRow.style.display = 'flex';
            if(endImagePort) endImagePort.classList.add('disabled');
          }
        }
      }
    }

    // 带数据创建视频节点（复用createVideoNode的逻辑）
    function createVideoNodeWithData(nodeData){
      // 临时保存nextNodeId
      const savedNextNodeId = state.nextNodeId;
      state.nextNodeId = nodeData.id;
      
      // 调用原有的创建函数
      createVideoNode({ x: nodeData.x, y: nodeData.y });
      
      // 恢复nextNodeId为最大值
      state.nextNodeId = Math.max(savedNextNodeId, nodeData.id + 1);
      
      // 更新节点数据
      const node = state.nodes.find(n => n.id === nodeData.id);
      if(node && nodeData.data){
        node.data.url = nodeData.data.url || '';
        node.data.name = nodeData.data.name || '';
        node.data.duration = nodeData.data.duration || 0;
        // 如果有URL，显示预览

            const thumbVideo = el.querySelector('.video-thumb');

                    node.data.duration = Math.round(thumbVideo.duration);

                }, { once: true });
              }
            }
          }
        }
      }
    }

    function renderMinimap(){
      if(state.nodes.length === 0){
        minimapContent.innerHTML = '';
        return;
      }
      
      // 计算所有节点的边界
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for(const node of state.nodes){
        const el = canvasEl.querySelector(`.node[data-node-id="${node.id}"]`);
        const w = el ? el.offsetWidth : 300;
        const h = el ? el.offsetHeight : 200;
        minX = Math.min(minX, node.x);
        minY = Math.min(minY, node.y);
        maxX = Math.max(maxX, node.x + w);
        maxY = Math.max(maxY, node.y + h);
      }
      
      // 添加边距
      minX -= 100;
      minY -= 100;
      maxX += 100;
      maxY += 100;
      
      const contentWidth = maxX - minX;
      const contentHeight = maxY - minY;
      
      // 计算缩放比例
      const scaleX = (MINIMAP_WIDTH - MINIMAP_PADDING * 2) / contentWidth;
      const scaleY = (MINIMAP_HEIGHT - MINIMAP_PADDING * 2) / contentHeight;
      const scale = Math.min(scaleX, scaleY, 0.15); // 最大缩放0.15
      
      let html = '';
      
      // 渲染节点
      for(const node of state.nodes){
        const el = canvasEl.querySelector(`.node[data-node-id="${node.id}"]`);
        const w = el ? el.offsetWidth : 300;
        const h = el ? el.offsetHeight : 200;
        const x = (node.x - minX) * scale + MINIMAP_PADDING;
        const y = (node.y - minY) * scale + MINIMAP_PADDING;
        const mw = w * scale;
        const mh = h * scale;
        html += `<div class="minimap-node" style="left:${x}px;top:${y}px;width:${mw}px;height:${mh}px;"></div>`;
      }
      
      // 渲染视口框
      const containerRect = canvasContainer.getBoundingClientRect();
      const viewportX = (-state.panX / state.zoom - minX) * scale + MINIMAP_PADDING;
      const viewportY = (-state.panY / state.zoom - minY) * scale + MINIMAP_PADDING;
      const viewportW = (containerRect.width / state.zoom) * scale;
      const viewportH = (containerRect.height / state.zoom) * scale;
      html += `<div class="minimap-viewport" style="left:${viewportX}px;top:${viewportY}px;width:${viewportW}px;height:${viewportH}px;"></div>`;
      
      minimapContent.innerHTML = html;
      
      // 保存minimap状态用于点击导航
      state.minimapState = { minX, minY, scale };
    }

    function applyTransform(){
      canvasWorld.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
    }

    function updateZoomLevel(){

        updateZoomLevel();
        renderConnections();

        renderImageConnections();

        renderConnections();

        renderImageConnections();
      }
    }
